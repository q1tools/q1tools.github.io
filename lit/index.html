];

// ── LIT Parser ──
function parseLIT(buf) {
  if (!(buf instanceof ArrayBuffer)) throw new Error('LIT input is not an ArrayBuffer');
  if (buf.byteLength < 8) throw new Error('LIT file is too small to contain a valid header');
  const dv = new DataView(buf);
  const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
  if (magic !== 'QLIT') throw new Error('Not a valid .lit file (expected QLIT header)');
  const version = dv.getInt32(4, true);

  if (version === LIT_VERSION_2) return parseLIT2(buf, dv);

  const isHDR = version === LIT_VERSION_E5BGR9;
  if (version !== LIT_VERSION && !isHDR) {
    throw new Error(`Unsupported .lit version: ${version} (expected 1, 2, or ${LIT_VERSION_E5BGR9} for HDR E5BGR9)`);
  }

  const payloadBytes = buf.byteLength - 8;
  const sampleStride = isHDR ? 4 : 3;
  if (payloadBytes % sampleStride !== 0) {
    throw new Error(`Corrupt ${isHDR ? 'HDR ' : ''}.lit payload: ${payloadBytes} bytes is not divisible by ${sampleStride}`);
  }

  if (!isHDR) {
    return buildRGBLightingData(buf, 8, payloadBytes, {
      version,
      sourceKind: 'external-lit',
      sourceLabel: litName || 'External .lit',
      formatLabel: `RGB .lit v${version}`,
      outputFlag: '-lit'
    });
  }

  return buildHDRLightingData(buf, 8, payloadBytes, {
    version,
    sourceKind: 'external-lit',
    sourceLabel: litName || 'External HDR .lit',
    formatLabel: 'HDR .lit (E5BGR9)',
    outputFlag: '-hdr'
  });
}

// ericw-tools -lit2 layout: header, interleaved 17-byte face records, RGB, then deluxe directions.
function parseLIT2(buf, dv) {
  if (buf.byteLength < 16) throw new Error('LIT2 file is too small for its extended header');
  const numSurfaces = dv.getInt32(8, true);
  const numSamples = dv.getInt32(12, true);
  if (numSurfaces < 0 || numSamples < 0) throw new Error('LIT2 header contains a negative count');

  const faceRecordBytes = 17;
  const metadataBytes = numSurfaces * faceRecordBytes;
  const rgbBytes = numSamples * 3;
  const expectedBytes = 16 + metadataBytes + rgbBytes * 2;
  if (!Number.isSafeInteger(expectedBytes) || expectedBytes !== buf.byteLength) {
    throw new Error(`Corrupt LIT2 size: header expects ${expectedBytes.toLocaleString()} bytes, got ${buf.byteLength.toLocaleString()}`);
  }

  const lit2Faces = [];
  let off = 16;
  for (let i = 0; i < numSurfaces; i++, off += faceRecordBytes) {
    lit2Faces.push({
      lightofs: dv.getInt32(off, true),
      styles: [
        dv.getUint16(off + 4, true), dv.getUint16(off + 6, true),
        dv.getUint16(off + 8, true), dv.getUint16(off + 10, true)
      ],
      width: dv.getUint16(off + 12, true),
      height: dv.getUint16(off + 14, true),
      lmshiftBits: dv.getUint8(off + 16)
    });
  }

  const lighting = buildRGBLightingData(buf, off, rgbBytes, {
    version: LIT_VERSION_2,
    sourceKind: 'external-lit2',
    sourceLabel: litName || 'External .lit2',
    formatLabel: 'RGB + deluxe .lit v2 (experimental)',
    outputFlag: '-lit2',
    sourceWarnings: [
      'LIT2 is experimental. QSS-M and ezQuake reject version 2; FTEQW has experimental support, but its local loader layout differs from current ericw-tools output.'
    ]
  });
  lighting.isLIT2 = true;
  lighting.numSurfaces = numSurfaces;
  lighting.lit2Faces = lit2Faces;
  lighting.luxData = new Uint8Array(buf, off + rgbBytes, rgbBytes);
  return lighting;
}

function buildRGBLightingData(buf, offset, payloadBytes, meta = {}) {
  if (payloadBytes % 3 !== 0) {
    throw new Error(`${meta.sourceLabel || 'RGB lighting data'} payload is not divisible by 3`);
  }
  const data = new Uint8Array(buf, offset, payloadBytes);
  return {
    version: meta.version ?? LIT_VERSION,
    data,
    analysisData: data,
    numSamples: data.length / 3,
    isHDR: false,
    isLIT2: false,
    sampleStride: 3,
    payloadBytes,
    hdrExposure: 1,
    sourceKind: meta.sourceKind || 'external-lit',
    sourceLabel: meta.sourceLabel || 'External .lit',
    formatLabel: meta.formatLabel || `RGB .lit v${meta.version ?? LIT_VERSION}`,
    outputFlag: Object.prototype.hasOwnProperty.call(meta, 'outputFlag') ? meta.outputFlag : '-lit',
    sourceWarnings: meta.sourceWarnings || []
  };
}

function buildHDRLightingData(buf, offset, payloadBytes, meta = {}) {
  if (payloadBytes % 4 !== 0) {
    throw new Error(`${meta.sourceLabel || 'HDR lighting data'} payload is not divisible by 4`);
  }

  const version = meta.version ?? LIT_VERSION_E5BGR9;
  const numSamples = payloadBytes / 4;
  const linearData = new Float32Array(numSamples * 3);
  const analysisData = new Float32Array(numSamples * 3);
  const samplePeaks = [];
  const exposureSampleStep = Math.max(1, Math.ceil(numSamples / 65536));
  const dv = new DataView(buf);
  let maxLinear = 0;
  for (let i = 0; i < numSamples; i++) {
    const packed = dv.getUint32(offset + i * 4, true);
    const rgb = unpackE5BGR9(packed);
    linearData[i * 3] = rgb[0];
    linearData[i * 3 + 1] = rgb[1];
    linearData[i * 3 + 2] = rgb[2];
    const peak = Math.max(rgb[0], rgb[1], rgb[2]);
    if (peak > maxLinear) maxLinear = peak;
    // Keep exposure selection representative without allocating an unbounded
    // second copy. Small files must sample every luxel; a fixed stride made a
    // two-sample HDR file depend entirely on its first sample.
    if ((i % exposureSampleStep) === 0 || i === numSamples - 1) samplePeaks.push(peak);
  }

  const hdrExposure = chooseHDRExposure(samplePeaks, maxLinear);
  const data = new Uint8ClampedArray(numSamples * 3);
  for (let i = 0; i < numSamples; i++) {
    analysisData[i * 3] = linearData[i * 3] * hdrExposure;
    analysisData[i * 3 + 1] = linearData[i * 3 + 1] * hdrExposure;
    analysisData[i * 3 + 2] = linearData[i * 3 + 2] * hdrExposure;
    data[i * 3] = clampByte(analysisData[i * 3]);
    data[i * 3 + 1] = clampByte(analysisData[i * 3 + 1]);
    data[i * 3 + 2] = clampByte(analysisData[i * 3 + 2]);
  }

  return {
    version,
    data,
    analysisData,
    linearData,
    numSamples,
    isHDR: true,
    isLIT2: false,
    sampleStride: 4,
    payloadBytes,
    hdrExposure,
    sourceKind: meta.sourceKind || 'external-lit',
    sourceLabel: meta.sourceLabel || 'External HDR .lit',
    formatLabel: meta.formatLabel || 'HDR .lit (E5BGR9)',
    outputFlag: Object.prototype.hasOwnProperty.call(meta, 'outputFlag') ? meta.outputFlag : '-hdr',
    sourceWarnings: meta.sourceWarnings || []
  };
}

function unpackE5BGR9(packed) {
  const biasedExponent = packed >>> 27;
  const exponent = biasedExponent - 24;
  const multiplier = Math.pow(2, exponent);
  return [
    (packed & 0x1ff) * multiplier,
    ((packed >>> 9) & 0x1ff) * multiplier,
    ((packed >>> 18) & 0x1ff) * multiplier
  ];
}

function chooseHDRExposure(samplePeaks, maxLinear) {
  if (maxLinear <= 0) return 1;
  if (samplePeaks.length === 0) return maxLinear > 255 ? 255 / maxLinear : 1;
  samplePeaks.sort((a, b) => a - b);
  const idx = Math.min(samplePeaks.length - 1, Math.ceil((samplePeaks.length - 1) * 0.98));
  const ref = samplePeaks[idx] > 0 ? samplePeaks[idx] : maxLinear;
  return ref > 255 ? 255 / ref : 1;
}

function clampByte(value) {
  return Math.max(0, Math.min(255, Math.round(value)));
}

function buildGrayLightingData(bsp, sourceWarnings) {
  const data = new Uint8ClampedArray(bsp.lightData.length * 3);
  for (let i = 0; i < bsp.lightData.length; i++) {
    data[i*3] = data[i*3+1] = data[i*3+2] = bsp.lightData[i];
  }
  return {
    version: null, data, analysisData: data, numSamples: bsp.lightData.length,
    isHDR: false, isLIT2: false, sampleStride: 1, payloadBytes: bsp.lightData.length,
    hdrExposure: 1, sourceKind: 'bsp-gray', sourceLabel: 'BSP LIGHTING lump',
    formatLabel: 'Native grayscale', outputFlag: null, sourceWarnings
  };
}

function buildNativeRGBLightingData(bsp, buf, sourceWarnings) {
  const lump = bsp.lumps[LUMP.LIGHTING];
  return buildRGBLightingData(buf, lump.fileofs, lump.filelen, {
    version: null,
    sourceKind: 'bsp-native-rgb',
    sourceLabel: 'BSP30 LIGHTING lump',
    formatLabel: 'Native Half-Life RGB',
    outputFlag: null,
    sourceWarnings
  });
}

function validateLightingSourceForBSP(bsp, lighting, sourceLabel, allowWithoutBaseGray = false) {
  if (lighting.isLIT2) {
    if (lighting.numSurfaces !== bsp.faces.length) {
      throw new Error(`${sourceLabel} describes ${lighting.numSurfaces} faces, but ${bspName || 'the BSP'} has ${bsp.faces.length}`);
    }
    for (let i = 0; i < lighting.lit2Faces.length; i++) {
      const face = lighting.lit2Faces[i];
      if (face.lightofs < -1) throw new Error(`${sourceLabel} face ${i} has invalid light offset ${face.lightofs}`);
      if (face.lmshiftBits > 30) throw new Error(`${sourceLabel} face ${i} has unsupported lightmap shift ${face.lmshiftBits}`);
      if (face.lightofs >= 0 && (face.width === 0 || face.height === 0)) {
        throw new Error(`${sourceLabel} face ${i} has an offset but empty lightmap dimensions`);
      }
      if (face.lightofs >= 0 && face.width > 0 && face.height > 0) {
        const numStyles = getLIT2ActiveStyles(face).length;
        if (numStyles === 0) throw new Error(`${sourceLabel} face ${i} has samples but no active lightstyle`);
        const faceSamples = face.width * face.height * numStyles;
        if (face.lightofs > lighting.numSamples || faceSamples > lighting.numSamples - face.lightofs) {
          throw new Error(`${sourceLabel} face ${i} points outside its RGB payload`);
        }
      }
    }
    return;
  }

  const expectedPayloadBytes = bsp.numLightSamples * lighting.sampleStride;
  if (bsp.numLightSamples === 0) {
    if (!allowWithoutBaseGray && lighting.payloadBytes !== 0) {
      throw new Error(`${sourceLabel} has ${lighting.payloadBytes.toLocaleString()} bytes, but ${bspName} has no grayscale LIGHTING samples`);
    }
    return;
  }
  if (lighting.payloadBytes !== expectedPayloadBytes) {
    throw new Error(`${sourceLabel} has ${lighting.payloadBytes.toLocaleString()} bytes, but ${bspName} expects ${expectedPayloadBytes.toLocaleString()} bytes (${bsp.numLightSamples.toLocaleString()} light samples)`);
  }
}

function parseEmbeddedLighting(bsp, buf, sourceWarnings) {
  if (bsp.bspx.lumps['LIGHTING_E5BGR9']) {
    const lump = bsp.bspx.lumps['LIGHTING_E5BGR9'];
    try {
      const lighting = buildHDRLightingData(buf, lump.offset, lump.length, {
        sourceKind: 'bspx-hdr',
        sourceLabel: 'BSPX LIGHTING_E5BGR9',
        formatLabel: 'BSPX HDR (E5BGR9)',
        outputFlag: '-bspxhdr',
        sourceWarnings
      });
      validateLightingSourceForBSP(bsp, lighting, 'Embedded BSPX LIGHTING_E5BGR9', true);
      return lighting;
    } catch (err) {
      sourceWarnings.push(`Embedded LIGHTING_E5BGR9 ignored: ${err.message}`);
    }
  }

  if (bsp.bspx.lumps['RGBLIGHTING']) {
    const lump = bsp.bspx.lumps['RGBLIGHTING'];
    try {
      const lighting = buildRGBLightingData(buf, lump.offset, lump.length, {
        sourceKind: 'bspx-rgb',
        sourceLabel: 'BSPX RGBLIGHTING',
        formatLabel: 'BSPX RGBLIGHTING',
        outputFlag: '-bspxlit',
        sourceWarnings
      });
      validateLightingSourceForBSP(bsp, lighting, 'Embedded BSPX RGBLIGHTING', true);
      return lighting;
    } catch (err) {
      sourceWarnings.push(`Embedded RGBLIGHTING ignored: ${err.message}`);
    }
  }

  return null;
}

function resolveLightingSource(bsp, buf) {
  const sourceWarnings = [...(bsp.bspxLighting.warnings || [])];

  // Half-Life BSP30 stores RGB directly. ezQuake and FTEQW use it before considering sidecars.
  if (bsp.isHL && bsp.rawLightData.length > 0) {
    if (litBuffer) sourceWarnings.push('External .lit ignored for BSP30: Half-Life lighting is already native RGB.');
    return buildNativeRGBLightingData(bsp, buf, sourceWarnings);
  }

  if (litBuffer) {
    try {
      const externalLighting = parseLIT(litBuffer);
      validateLightingSourceForBSP(bsp, externalLighting, `External ${litName || '.lit'}`);
      const bspStem = bspName.replace(/\.bsp$/i, '').toLowerCase();
      const litStem = litName.replace(/\.lit$/i, '').toLowerCase();
      if (bspStem && litStem && bspStem !== litStem) {
        sourceWarnings.push(`Filename mismatch: ${litName} is accepted by size, but cannot be proven to belong to ${bspName}.`);
      }
      externalLighting.sourceWarnings = [...sourceWarnings, ...(externalLighting.sourceWarnings || [])];
      return externalLighting;
    } catch (err) {
      sourceWarnings.push(`External ${litName || '.lit'} ignored: ${err.message}`);
    }
  }

  const embeddedLighting = parseEmbeddedLighting(bsp, buf, sourceWarnings);
  if (embeddedLighting) return embeddedLighting;

  // A BSP with no LIGHTING samples is valid (for example, an all-special or
  // deliberately fullbright map). Keep it analyzable instead of requiring a
  // synthetic empty .lit sidecar.
  return buildGrayLightingData(bsp, sourceWarnings);
}

function getGrayLightingData(bsp, lit) {
  if (bsp.lightData.length === lit.numSamples) {
    return { data: bsp.lightData, sourceLabel: 'BSP LIGHTING lump', derived: false };
  }

  const analysisData = lit.analysisData || lit.data;
  const data = new Uint8Array(lit.numSamples);
  for (let i = 0; i < lit.numSamples; i++) {
    const r = analysisData[i * 3];
    const g = analysisData[i * 3 + 1];
    const b = analysisData[i * 3 + 2];
    data[i] = clampByte((r + g + b) / 3);
  }
  return { data, sourceLabel: 'Derived from active RGB/HDR lighting', derived: true };
}

// ── Entity Parser ──
function parseEntities(str) {
  const ents = [];
  let i = 0;
  while (i < str.length) {
    while (i < str.length && str[i] !== '{') i++;
    if (i >= str.length) break;
    i++;
    const ent = {};
    const keyOrder = [];
    const pairs = [];
    while (i < str.length && str[i] !== '}') {
      while (i < str.length && str[i] !== '"' && str[i] !== '}') i++;
      if (str[i] === '}') break;
      i++;
      let key = '';
      while (i < str.length && str[i] !== '"') key += str[i++];
      if (i >= str.length) throw new Error('Malformed entity lump: unterminated key');
      i++;
      while (i < str.length && str[i] !== '"') i++;
      if (i >= str.length) throw new Error(`Malformed entity lump: missing value for ${key}`);
      i++;
      let val = '';
      while (i < str.length && str[i] !== '"') val += str[i++];
      if (i >= str.length) throw new Error(`Malformed entity lump: unterminated value for ${key}`);
      i++;
      ent[key] = val;
      keyOrder.push(key);
      pairs.push([key, val]);
    }
    if (str[i] !== '}') throw new Error('Malformed entity lump: missing closing brace');
    i++;
    Object.defineProperty(ent, '_keyOrder', { value: keyOrder, enumerable: false });
    Object.defineProperty(ent, '_pairs', { value: pairs, enumerable: false });
    ents.push(ent);
  }
  return ents;
}

// ── Face vertex at edge index ──
function faceVertexIndex(face, edgeIdx, bsp) {
  const sei = bsp.surfedges[face.firstedge + edgeIdx];
  if (sei >= 0) return bsp.edges[sei * 2];
  return bsp.edges[(-sei) * 2 + 1];
}

function getVertex(vi, bsp) {
  return [bsp.vertices[vi*3], bsp.vertices[vi*3+1], bsp.vertices[vi*3+2]];
}

function getActiveStyles(face, faceIdx, bsp) {
  const table = bsp.bspxLighting.styleTable;
  if (table && table[faceIdx]) {
    const invalid = bsp.bspxLighting.lmstyleSource === 'LMSTYLE16' ? INVALID_STYLE16 : INVALID_STYLE;
    const styles = [];
    for (const style of table[faceIdx]) {
      if (style === invalid) break;
      styles.push(style);
    }
    return styles;
  }

  const styles = [];
  for (const style of face.styles) {
    if (style === INVALID_STYLE) break;
    styles.push(style);
  }
  return styles;
}

function getLIT2ActiveStyles(face) {
  const styles = [];
  for (const style of face.styles) {
    if (style === INVALID_STYLE16) break;
    styles.push(style);
  }
  return styles;
}

function getDefaultLightmapShift(worldspawn, warnings = null) {
  const raw = worldspawn['_lightmap_scale'] ?? worldspawn['lightmap_scale'];
  if (raw === undefined) return 4;
  const text = String(raw).trim();
  if (!/^\+?\d+$/.test(text)) {
    if (warnings) warnings.push(`Invalid worldspawn lightmap_scale "${raw}" ignored; using 16.`);
    return 4;
  }
  let scale = Number(text);
  if (!Number.isSafeInteger(scale) || scale <= 0 || scale > 2 ** 30) {
    if (warnings && scale !== 0) warnings.push(`Unsupported worldspawn lightmap_scale "${raw}" ignored; using 16.`);
    return 4;
  }
  const requestedScale = scale;
  let shiftBits = 0;
  while (scale > 1) {
    scale = Math.floor(scale / 2);
    shiftBits++;
  }
  const engineScale = 2 ** shiftBits;
  if (engineScale !== requestedScale && warnings) {
    warnings.push(`Non-power-of-two lightmap_scale ${requestedScale}: ericw-tools can compile it exactly, but QSS-M/FTEQW reconstruct ${engineScale}; lightmap extents may be incompatible.`);
  }
  return shiftBits;
}

function checkedLightmapSampleCount(width, height, numStyles, faceIdx) {
  if (!Number.isSafeInteger(width) || !Number.isSafeInteger(height) || width <= 0 || height <= 0) {
    throw new Error(`Face ${faceIdx} has invalid lightmap dimensions ${width}x${height}`);
  }
  if (!Number.isSafeInteger(numStyles) || numStyles <= 0) {
    throw new Error(`Face ${faceIdx} has invalid lightstyle count ${numStyles}`);
  }
  const numSamples = width * height * numStyles;
  if (!Number.isSafeInteger(numSamples)) {
    throw new Error(`Face ${faceIdx} lightmap sample count exceeds JavaScript's safe integer range`);
  }
  return numSamples;
}

// ── Compute face lightmap extents (matches ericw-tools/QSS-M exactly) ──
function faceLightmapInfo(face, faceIdx, bsp, defaultShiftBits, lit = null) {
  const lit2Face = lit && lit.isLIT2 ? lit.lit2Faces[faceIdx] : null;
  const lightofs = getLightOffset(face, faceIdx, bsp, lit);
  if (lightofs < 0) return null;
  if (face.numedges === 0) return null;
  if (face.texinfo < 0 || face.texinfo >= bsp.texinfos.length) return null;

  const ti = bsp.texinfos[face.texinfo];
  if (ti.flags & TEX_SPECIAL) return null;
  const activeStyles = lit2Face ? getLIT2ActiveStyles(lit2Face) : getActiveStyles(face, faceIdx, bsp);
  if (activeStyles.length === 0) {
    throw new Error(`Face ${faceIdx} has lighting data but no active lightstyle`);
  }

  if (lit2Face) {
    if (lit2Face.width === 0 || lit2Face.height === 0) return null;
    const numStyles = activeStyles.length;
    const texName = (ti.miptex >= 0 && ti.miptex < bsp.texNames.length) ? bsp.texNames[ti.miptex] : '';
    return {
      width: lit2Face.width, height: lit2Face.height, numStyles,
      numSamples: checkedLightmapSampleCount(lit2Face.width, lit2Face.height, numStyles, faceIdx),
      texName, lmMinS: 0, lmMinT: 0, activeStyles, lightofs,
      lmshift: 2 ** lit2Face.lmshiftBits, decoupled: false, lit2: true
    };
  }

  // Check for DECOUPLED_LM (explicit per-face dimensions)
  if (bsp.bspxLighting.decoupledLM && bsp.bspxLighting.decoupledLM[faceIdx]) {
    const dlm = bsp.bspxLighting.decoupledLM[faceIdx];
    if (dlm.lmwidth > 0 && dlm.lmheight > 0) {
      const numStyles = activeStyles.length;
      const texName = (ti.miptex >= 0 && ti.miptex < bsp.texNames.length) ? bsp.texNames[ti.miptex] : '';
      return {
        width: dlm.lmwidth, height: dlm.lmheight, numStyles,
        numSamples: checkedLightmapSampleCount(dlm.lmwidth, dlm.lmheight, numStyles, faceIdx),
        texName, lmMinS: 0, lmMinT: 0,
        activeStyles,
        lightofs, decoupled: true
      };
    }
  }

  // Per-face LMSHIFT from BSPX, or worldspawn/default 16 units per luxel
  let shiftBits = defaultShiftBits;
  if (bsp.bspxLighting.lmshifts) {
    shiftBits = bsp.bspxLighting.lmshifts[faceIdx];
  }
  if (!Number.isInteger(shiftBits) || shiftBits < 0 || shiftBits > 30) {
    throw new Error(`Face ${faceIdx} has unsupported lightmap shift ${shiftBits}`);
  }
  const shift = 2 ** shiftBits;

  let minS = Infinity, maxS = -Infinity;
  let minT = Infinity, maxT = -Infinity;

  for (let e = 0; e < face.numedges; e++) {
    const vi = faceVertexIndex(face, e, bsp);
    const v = getVertex(vi, bsp);
    // Both QSS-M and ericw-tools retain wide intermediates, then store the
    // final texture coordinate as float before floor/ceil. That last rounding
    // point matters for coordinates extremely close to a luxel boundary.
    const s = Math.fround(ti.vecs[0][0]*v[0] + ti.vecs[0][1]*v[1] + ti.vecs[0][2]*v[2] + ti.vecs[0][3]);
    const t = Math.fround(ti.vecs[1][0]*v[0] + ti.vecs[1][1]*v[1] + ti.vecs[1][2]*v[2] + ti.vecs[1][3]);
    if (s < minS) minS = s; if (s > maxS) maxS = s;
    if (t < minT) minT = t; if (t > maxT) maxT = t;
  }

  // ericw-tools / QSS-M formula: floor(min/shift), ceil(max/shift), extent = ceil-floor, width = extent+1
  const lmMinS = Math.floor(minS / shift);
  const lmMaxS = Math.ceil(maxS / shift);
  const lmMinT = Math.floor(minT / shift);
  const lmMaxT = Math.ceil(maxT / shift);

  const width = (lmMaxS - lmMinS) + 1;
  const height = (lmMaxT - lmMinT) + 1;

  const numStyles = activeStyles.length;
  const numSamples = checkedLightmapSampleCount(width, height, numStyles, faceIdx);

  const texName = (ti.miptex >= 0 && ti.miptex < bsp.texNames.length) ? bsp.texNames[ti.miptex] : '';

  return {
    width, height, numStyles,
    numSamples,
    texName, lmMinS, lmMinT,
    activeStyles,
    lightofs, lmshift: shift, decoupled: false
  };
}

// Return the first sample for a particular style block. Lightmaps store one
// full width*height block per active style, in style-table order.
function getFaceStyleOffset(lm, style = 0, fallbackToFirst = false) {
  const styleIndex = lm.activeStyles.indexOf(style);
  if (styleIndex >= 0) return lm.lightofs + styleIndex * lm.width * lm.height;
  return fallbackToFirst && lm.activeStyles.length > 0 ? lm.lightofs : -1;
}

// ── Get effective light offset for a face (BSPX LMOFFSET or DECOUPLED_LM override) ──
function getLightOffset(face, faceIdx, bsp, lit = null) {
  if (lit && lit.isLIT2) return lit.lit2Faces[faceIdx].lightofs;
  let offset;
  if (bsp.bspxLighting.decoupledLM && bsp.bspxLighting.decoupledLM[faceIdx]) {
    offset = bsp.bspxLighting.decoupledLM[faceIdx].offset;
  } else if (bsp.bspxLighting.lmoffsets) {
    offset = bsp.bspxLighting.lmoffsets[faceIdx];
  } else {
    offset = face.lightofs;
  }
  if (offset < -1) throw new Error(`Face ${faceIdx} has invalid light offset ${offset}`);
  if (offset < 0) return offset;
  if (offset % bsp.lightingSampleStride !== 0) {
    throw new Error(`Face ${faceIdx} light offset ${offset} is not aligned to ${bsp.lightingSampleStride}-byte samples`);
  }
  return offset / bsp.lightingSampleStride;
}

// ── Face normal (respects side) ──
function faceNormal(face, bsp) {
  const p = bsp.planes[face.planenum];
  if (face.side) return [-p.normal[0], -p.normal[1], -p.normal[2]];
  return [...p.normal];
}

// ── Face center ──
function faceCenter(face, bsp) {
  let cx = 0, cy = 0, cz = 0;
  for (let e = 0; e < face.numedges; e++) {
    const v = getVertex(faceVertexIndex(face, e, bsp), bsp);
    cx += v[0]; cy += v[1]; cz += v[2];
  }
  const n = face.numedges;
  return [cx/n, cy/n, cz/n];
}

// ── Light entity analysis ──
function analyzeLightEntities(lightEnts) {
  const result = {
    point: [], spot: [], sun: [], surface: [],
    intensityMin: Infinity, intensityMax: -Infinity, intensityAvg: 0,
    colors: [], styledCount: 0, switchableCount: 0
  };

  for (const e of lightEnts) {
    // ericw-tools accepts Half-Life's `light "r g b intensity"` form (and
    // the three-component color-only form), with _color taking priority.
    const rawLight = String(e.light ?? e._light ?? '300').trim();
    const lightParts = rawLight ? rawLight.split(/\s+/).map(Number) : [];
    const validLightParts = lightParts.every(Number.isFinite);
    let intensity = 300;
    let impliedColor = null;
    if (validLightParts && lightParts.length === 1) intensity = lightParts[0];
    else if (validLightParts && lightParts.length === 3) impliedColor = lightParts;
    else if (validLightParts && lightParts.length === 4) {
      impliedColor = lightParts.slice(0, 3);
      intensity = lightParts[3];
    }
    result.intensityMin = Math.min(result.intensityMin, intensity);
    result.intensityMax = Math.max(result.intensityMax, intensity);
    result.intensityAvg += intensity;

    // Parse color
    const colorStr = e._color || (impliedColor ? impliedColor.join(' ') : '255 255 255');
    const parts = colorStr.trim().split(/\s+/).map(Number);
    let r = Number.isFinite(parts[0]) ? parts[0] : 255;
    let g = Number.isFinite(parts[1]) ? parts[1] : 255;
    let b = Number.isFinite(parts[2]) ? parts[2] : 255;
    // Normalize 0-1 range to 0-255 (ericw-tools behavior)
    if (r >= 0 && r <= 1 && g >= 0 && g <= 1 && b >= 0 && b <= 1) {
      r = Math.round(r * 255); g = Math.round(g * 255); b = Math.round(b * 255);
    }
    r = clampByte(r); g = clampByte(g); b = clampByte(b);
    result.colors.push([r, g, b]);

    // Classify
    if (settingEnabled(e._sun)) result.sun.push(e);
    else if (e._surface) result.surface.push(e);
    else if (e.target || e.mangle) result.spot.push(e);
    else result.point.push(e);

    if (e.style && e.style !== '0') result.styledCount++;
    if (e.targetname) result.switchableCount++;
  }

  if (lightEnts.length > 0) {
    result.intensityAvg /= lightEnts.length;
  } else {
    result.intensityMin = 0;
    result.intensityMax = 0;
  }

  // Find dominant colors (simple binning)
  result.dominantColors = findDominantColors(result.colors);

  return result;
}

// ── Simple dominant color finder ──
function findDominantColors(colors) {
  if (colors.length === 0) return [];
  const bins = new Map();
  for (const [r, g, b] of colors) {
    // Quantize to 32-unit bins
    const qr = Math.round(r / 32) * 32;
    const qg = Math.round(g / 32) * 32;
    const qb = Math.round(b / 32) * 32;
    const key = `${qr},${qg},${qb}`;
    if (!bins.has(key)) bins.set(key, { r: 0, g: 0, b: 0, count: 0 });
    const bin = bins.get(key);
    bin.r += r; bin.g += g; bin.b += b; bin.count++;
  }
  return [...bins.values()]
    .sort((a, b) => b.count - a.count)
    .slice(0, 5)
    .map(b => ({
      r: Math.round(b.r / b.count),
      g: Math.round(b.g / b.count),
      b: Math.round(b.b / b.count),
      count: b.count,
      pct: (b.count / colors.length * 100).toFixed(1)
    }));
}

// ── Main analysis ──
function analyze() {
  try {
    const bsp = parseBSP(bspBuffer);
    const lit = resolveLightingSource(bsp, bspBuffer);
    const grayInfo = getGrayLightingData(bsp, lit);

    const entities = parseEntities(bsp.entString);
    const worldspawn = entities.find(e => e.classname === 'worldspawn') || {};
    const lightEnts = entities.filter(e => e.classname && e.classname.startsWith('light'));
    const lightStats = analyzeLightEntities(lightEnts);
    const defaultShiftBits = getDefaultLightmapShift(worldspawn, lit.sourceWarnings);

    // Per-face lightmap info + validation
    const faceAnalysis = analyzeFaces(bsp, lit, grayInfo.data, defaultShiftBits);

    // Global lightmap statistics
    const stats = analyzeLighting(grayInfo.data, lit, faceAnalysis);

    // Sun direction inference
    const sunInference = inferSunDirection(bsp, faceAnalysis, grayInfo.data);

    // Infer settings
    const inferred = inferSettings(bsp, lit, grayInfo.data, entities, worldspawn, lightEnts, lightStats, stats, faceAnalysis, sunInference);

    // Render
    renderOutput(bsp, lit, grayInfo, entities, worldspawn, lightEnts, lightStats, stats, faceAnalysis, sunInference, inferred, defaultShiftBits);

  } catch (err) {
    document.getElementById('output').innerHTML =
      `<div class="section" style="color:#fb7185"><strong>Error:</strong> ${escHTML(err.message)}</div>`;
    console.error(err);
  }
}

// ── Per-face analysis ──
function analyzeFaces(bsp, lit, grayData, defaultShiftBits) {
  const infos = [];
  let totalExpected = 0, referencedSamples = 0, maxReferencedSample = 0, outOfBoundsFaces = 0;
  let litFaces = 0, unlitFaces = 0, specialFaces = 0;
  let multiStyleFaces = 0;
  let maxWidth = 0, maxHeight = 0;
  const ranges = [];

  for (let fi = 0; fi < bsp.faces.length; fi++) {
    const face = bsp.faces[fi];
    const lm = faceLightmapInfo(face, fi, bsp, defaultShiftBits, lit);
    infos.push(lm);

    if (!lm) {
      if (getLightOffset(face, fi, bsp, lit) < 0) unlitFaces++;
      else specialFaces++;
      continue;
    }

    litFaces++;
    referencedSamples += lm.numSamples;
    const end = lm.lightofs + lm.numSamples;
    maxReferencedSample = Math.max(maxReferencedSample, end);
    if (lm.lightofs > grayData.length || lm.numSamples > grayData.length - lm.lightofs) outOfBoundsFaces++;
    else ranges.push([lm.lightofs, end]);
    if (lm.numStyles > 1) multiStyleFaces++;
    if (lm.width > maxWidth) maxWidth = lm.width;
    if (lm.height > maxHeight) maxHeight = lm.height;
  }

  ranges.sort((a, b) => a[0] - b[0]);
  const referencedRanges = [];
  for (const [start, end] of ranges) {
    const previous = referencedRanges[referencedRanges.length - 1];
    if (!previous || start > previous[1]) {
      referencedRanges.push([start, end]);
    } else {
      previous[1] = Math.max(previous[1], end);
    }
  }
  const coveredSamples = referencedRanges.reduce((sum, range) => sum + range[1] - range[0], 0);
  totalExpected = maxReferencedSample;
  const unusedSamples = Math.max(0, grayData.length - coveredSamples);
  const sampleMatch = outOfBoundsFaces === 0;

  return {
    infos, totalExpected, litFaces, unlitFaces, specialFaces,
    multiStyleFaces, maxWidth, maxHeight, sampleMatch,
    referencedSamples, maxReferencedSample, coveredSamples, unusedSamples, outOfBoundsFaces,
    referencedRanges
  };
}

// ── Global lightmap statistics ──
function analyzeLighting(grayData, lit, faceAnalysis) {
  const sourceSamples = lit.numSamples;
  const ranges = faceAnalysis.referencedRanges || (sourceSamples > 0 ? [[0, sourceSamples]] : []);
  const n = ranges.reduce((sum, range) => sum + range[1] - range[0], 0);
  const analysisData = lit.analysisData || lit.data;
  const displayData = lit.data;
  let totalR = 0, totalG = 0, totalB = 0, totalGray = 0;
  let maxR = 0, maxG = 0, maxB = 0, maxGray = 0;
  let minNonZeroGray = 256;
  let numLit = 0, numPreviewClipped = 0, numFullDark = 0;
  let totalSaturation = 0, satCount = 0;
  const brightHist = new Uint32Array(256);
  const rHist = new Uint32Array(256);
  const gHist = new Uint32Array(256);
  const bHist = new Uint32Array(256);

  if (n === 0) {
    return {
      numSamples: 0, sourceSamples, avgR: 0, avgG: 0, avgB: 0, avgGray: 0,
      maxR: 0, maxG: 0, maxB: 0, maxGray: 0, minNonZeroGray: 256,
      numLit: 0, numPreviewClipped: 0, numFullDark: 0,
      avgSaturation: 0, hasColor: false, colorDrift: 0,
      possibleMinlight: 0, minlightColor: null,
      brightHist, rHist, gHist, bHist
    };
  }

  for (const [start, end] of ranges) {
    for (let i = start; i < end; i++) {
      const r = analysisData[i*3], g = analysisData[i*3+1], b = analysisData[i*3+2];
      const gray = grayData[i];
      const dr = displayData[i*3], dg = displayData[i*3+1], db = displayData[i*3+2];

      totalR += r; totalG += g; totalB += b; totalGray += gray;
      if (r > maxR) maxR = r; if (g > maxG) maxG = g; if (b > maxB) maxB = b;
      if (gray > maxGray) maxGray = gray;
      brightHist[gray]++;
      rHist[dr]++; gHist[dg]++; bHist[db]++;

      if (gray > 0) {
        numLit++;
        if (gray < minNonZeroGray) minNonZeroGray = gray;
      } else {
        numFullDark++;
      }

      if (dr === 255 || dg === 255 || db === 255) numPreviewClipped++;

      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      if (mx > 10) {
        totalSaturation += (mx - mn) / mx;
        satCount++;
      }
    }
  }

  const avgR = totalR / n, avgG = totalG / n, avgB = totalB / n;
  const avgGray = totalGray / n;
  const avgSaturation = satCount > 0 ? totalSaturation / satCount : 0;

  // Color drift: check if LIT is truly colored or just grayscale-replicated
  let colorDriftSum = 0, colorDriftCount = 0;
  for (const [start, end] of ranges) {
    for (let i = start; i < end; i++) {
      const r = analysisData[i*3], g = analysisData[i*3+1], b = analysisData[i*3+2];
      if (r > 5 || g > 5 || b > 5) {
        const avg3 = (r + g + b) / 3;
        if (avg3 > 2) {
          colorDriftSum += (Math.abs(r - avg3) + Math.abs(g - avg3) + Math.abs(b - avg3)) / avg3;
          colorDriftCount++;
        }
      }
    }
  }
  const colorDrift = colorDriftCount > 0 ? colorDriftSum / colorDriftCount : 0;
  const hasColor = colorDrift > 0.05;

  // Estimate minlight from histogram — look for a floor value
  let possibleMinlight = 0;
  if (minNonZeroGray < 256) {
    // If many lit samples cluster at the same low value, that's likely minlight
    let bestVal = 0, bestCount = 0;
    for (let v = 1; v < 40; v++) {
      if (brightHist[v] > bestCount) { bestCount = brightHist[v]; bestVal = v; }
    }
    if (bestCount > numLit * 0.04 && bestVal > 0 && bestVal < 40) {
      possibleMinlight = bestVal;
    }
  }

  // Minlight color: average color of samples near the minlight level
  let mlR = 0, mlG = 0, mlB = 0, mlCount = 0;
  if (possibleMinlight > 0) {
    const lo = Math.max(1, possibleMinlight - 2), hi = possibleMinlight + 2;
    for (const [start, end] of ranges) {
      for (let i = start; i < end; i++) {
        const gray = grayData[i];
        if (gray >= lo && gray <= hi) {
          mlR += analysisData[i*3]; mlG += analysisData[i*3+1]; mlB += analysisData[i*3+2];
          mlCount++;
        }
      }
    }
  }
  const minlightColor = mlCount > 10 ? [
    clampByte(mlR / mlCount), clampByte(mlG / mlCount), clampByte(mlB / mlCount)
  ] : null;

  return {
    numSamples: n, sourceSamples, avgR, avgG, avgB, avgGray,
    maxR, maxG, maxB, maxGray, minNonZeroGray,
    numLit, numPreviewClipped, numFullDark,
    avgSaturation, hasColor, colorDrift,
    possibleMinlight, minlightColor,
    brightHist, rHist, gHist, bHist
  };
}

// ── Sun direction inference by analyzing per-normal brightness ──
function inferSunDirection(bsp, faceAnalysis, grayData) {
  // Bin faces by normal direction, compute average brightness per bin
  // Use 26 directions (6 axes + 12 edges + 8 corners of a cube)
  const dirs = [];
  // 6 axial
  for (let a = 0; a < 3; a++) {
    for (const s of [-1, 1]) {
      const d = [0, 0, 0]; d[a] = s;
      dirs.push(d);
    }
  }
  // 12 edge diagonals: choose the zero axis, then both signs on the other two.
  for (let zeroAxis = 0; zeroAxis < 3; zeroAxis++) {
    const axes = [0, 1, 2].filter(axis => axis !== zeroAxis);
    for (const a of [-1, 1]) for (const b of [-1, 1]) {
      const d = [0, 0, 0];
      d[axes[0]] = a / Math.sqrt(2);
      d[axes[1]] = b / Math.sqrt(2);
      dirs.push(d);
    }
  }
  // 8 corners
  for (const x of [-1, 1]) for (const y of [-1, 1]) for (const z of [-1, 1]) {
    const len = Math.sqrt(3);
    dirs.push([x/len, y/len, z/len]);
  }

  const dirBrightness = dirs.map(() => ({ sum: 0, count: 0 }));

  for (let fi = 0; fi < bsp.faces.length; fi++) {
    const face = bsp.faces[fi];
    const lm = faceAnalysis.infos[fi];
    if (!lm || lm.lightofs < 0) continue;
    if (lm.texName.toLowerCase().startsWith('sky')) continue;

    const normal = faceNormal(face, bsp);

    // Average brightness of this face's static style block. A face whose first
    // stored block is switchable must not masquerade as style 0.
    const styleOffset = getFaceStyleOffset(lm, 0);
    if (styleOffset < 0) continue;
    const numPx = lm.width * lm.height;
    let faceSum = 0;
    for (let p = 0; p < numPx; p++) {
      const idx = styleOffset + p;
      if (idx < grayData.length) faceSum += grayData[idx];
    }
    const faceAvg = faceSum / numPx;

    // Contribute to each direction bin weighted by dot product
    for (let d = 0; d < dirs.length; d++) {
      const dot = normal[0]*dirs[d][0] + normal[1]*dirs[d][1] + normal[2]*dirs[d][2];
      if (dot > 0.3) {
        dirBrightness[d].sum += faceAvg * dot;
        dirBrightness[d].count += dot;
      }
    }
  }

  // Find brightest direction
  let bestDir = -1, bestAvg = 0;
  const dirAvgs = dirBrightness.map((db, i) => {
    const avg = db.count > 0 ? db.sum / db.count : 0;
    if (avg > bestAvg) { bestAvg = avg; bestDir = i; }
    return avg;
  });

  // Compare only bins represented by map geometry. Counting empty directions
  // as zero made a single isolated face look like strong directional light.
  const populatedDirAvgs = dirAvgs.filter((_, i) => dirBrightness[i].count > 0);
  const totalAvg = populatedDirAvgs.length > 0
    ? populatedDirAvgs.reduce((a, b) => a + b, 0) / populatedDirAvgs.length
    : 0;
  const sunRatio = totalAvg > 0 ? bestAvg / totalAvg : 0;

  // Convert best direction to yaw/pitch mangle
  let mangle = '0 -90 0';
  let sunVec = [0, 0, 1];
  let sunRayVec = [0, 0, -1];
  if (bestDir >= 0) {
    sunVec = dirs[bestDir];
    sunRayVec = sunVec.map(value => -value);
    if (sunRatio > 1.3) {
      // Bright faces point back toward the sky ray. ericw-tools takes the
      // opposite vector as _sunlight_mangle, then negates it before tracing.
      const rawYaw = Math.round(Math.atan2(sunRayVec[1], sunRayVec[0]) * 180 / Math.PI);
      const yaw = (rawYaw + 360) % 360;
      const pitch = Math.round(Math.asin(Math.max(-1, Math.min(1, sunRayVec[2]))) * 180 / Math.PI);
      mangle = `${yaw} ${pitch} 0`;
    }
  }

  // Up-facing vs other for simple sunlight detection
  let upSum = 0, upCount = 0, otherSum = 0, otherCount = 0;
  for (let fi = 0; fi < bsp.faces.length; fi++) {
    const face = bsp.faces[fi];
    const lm = faceAnalysis.infos[fi];
    if (!lm || lm.lightofs < 0) continue;
    if (lm.texName.toLowerCase().startsWith('sky')) continue;
    const styleOffset = getFaceStyleOffset(lm, 0);
    if (styleOffset < 0) continue;
    const normal = faceNormal(face, bsp);
    const numPx = lm.width * lm.height;
    let faceSum = 0;
    for (let p = 0; p < numPx; p++) {
      const idx = styleOffset + p;
      if (idx < grayData.length) faceSum += grayData[idx];
    }
    const faceAvg = faceSum / numPx;
    if (normal[2] > 0.7) { upSum += faceAvg; upCount++; }
    else { otherSum += faceAvg; otherCount++; }
  }
  const avgUpFacing = upCount > 0 ? upSum / upCount : 0;
  const avgOther = otherCount > 0 ? otherSum / otherCount : 0;
  const upRatio = avgOther > 0 ? avgUpFacing / avgOther : 0;

  return {
    dirs, dirAvgs, bestDir, bestAvg, totalAvg, sunRatio,
    mangle, sunVec, sunRayVec,
    avgUpFacing, avgOther, upRatio
  };
}

// ── Infer settings ──
function inferSettings(bsp, lit, grayData, entities, worldspawn, lightEnts, lightStats, stats, faceAnalysis, sunInf) {
  const inf = { cmdFlags: [], worldspawnKeys: {}, confidence: {}, notes: [] };

  // Copy existing worldspawn lighting keys
  const lightingPrefixes = [
    '_sun', '_min', '_max', '_dirt', '_bounce', '_dist', '_range',
    '_gamma', '_angle', '_phong', '_surf', '_addmin', '_lightmap',
    '_compilerstyle', '_sky'
  ];
  for (const [k, v] of Object.entries(worldspawn)) {
    if (k === 'light' || lightingPrefixes.some(p => k.startsWith(p))) {
      inf.worldspawnKeys[k] = v;
    }
  }

  // ── Lighting output flag ──
  inf.outputFlag = lit.outputFlag;
  if (lit.outputFlag) inf.cmdFlags.push(lit.outputFlag);
  inf.confidence.output = stats.hasColor ? 'high' : 'inferred';
  if (stats.hasColor) {
    inf.notes.push(`Colored lighting detected in ${lit.sourceLabel} — map uses colored lights or sunlight color.`);
  }
  if (!lit.outputFlag) inf.notes.push(`${lit.sourceLabel} does not require an external lighting output flag.`);
  for (const warning of lit.sourceWarnings || []) inf.notes.push(warning);

  // ── Sunlight ──
  const sunKeyValue = firstPresent(inf.worldspawnKeys['_sunlight'], inf.worldspawnKeys['_sun_light']);
  const hasSunKey = settingEnabled(sunKeyValue);
  const sunEnts = lightEnts.filter(e => settingEnabled(e._sun));

  if (!hasSunKey && sunEnts.length === 0 && sunInf.upRatio > 1.5) {
    const estSunlight = Math.round((sunInf.avgUpFacing - sunInf.avgOther) * 2);
    if (estSunlight > 10) {
      inf.worldspawnKeys['_sunlight'] = String(Math.min(estSunlight, 300));
      inf.worldspawnKeys['_sunlight_mangle'] = sunInf.mangle;
      inf.confidence.sunlight = 'medium';
      inf.notes.push(`Up-facing surfaces are ${sunInf.upRatio.toFixed(1)}x brighter than others — suggests sunlight ~${inf.worldspawnKeys['_sunlight']}.`);
    }
  } else if (hasSunKey) {
    inf.confidence.sunlight = 'high';
    inf.notes.push(`Sunlight key found in worldspawn: ${sunKeyValue}.`);
  } else if (sunEnts.length > 0) {
    inf.confidence.sunlight = 'high';
    inf.notes.push(`${sunEnts.length} _sun entity/entities found — sunlight handled via entities.`);
  }

  // ── Minlight ──
  if (!inf.worldspawnKeys['_minlight'] && !(inf.worldspawnKeys['light'] && parseFloat(inf.worldspawnKeys['light']) > 0)) {
    if (stats.possibleMinlight > 0) {
      inf.worldspawnKeys['_minlight'] = String(stats.possibleMinlight);
      inf.confidence.minlight = 'medium';
      if (stats.minlightColor) {
        const [r, g, b] = stats.minlightColor;
        if (Math.abs(r - g) > 8 || Math.abs(g - b) > 8 || Math.abs(r - b) > 8) {
          inf.worldspawnKeys['_minlight_color'] = `${r} ${g} ${b}`;
          inf.notes.push(`Minlight appears tinted: rgb(${r}, ${g}, ${b}).`);
        }
      }
      inf.notes.push(`Histogram floor at brightness ${stats.possibleMinlight} suggests minlight.`);
    }
  }

  // ── Bounce ──
  if (!inf.worldspawnKeys['_bounce']) {
    const analysisData = lit.analysisData || lit.data;
    let shadowSat = 0, shadowCnt = 0;
    for (const [start, end] of faceAnalysis.referencedRanges) {
      for (let i = start; i < end; i++) {
        const gray = grayData[i];
        if (gray > 2 && gray < 30) {
          const r = analysisData[i*3], g = analysisData[i*3+1], b = analysisData[i*3+2];
          const mx = Math.max(r, g, b);
          if (mx > 3) {
            shadowSat += (mx - Math.min(r, g, b)) / mx;
            shadowCnt++;
          }
        }
      }
    }
    if (shadowCnt > 100 && shadowSat / shadowCnt > 0.08) {
      inf.worldspawnKeys['_bounce'] = '1';
      inf.confidence.bounce = 'low';
      inf.notes.push('Dim areas show color saturation — possible bounce lighting.');
    }
  }

  // ── Dirt ──
  if (settingEnabled(firstPresent(inf.worldspawnKeys['_dirt'], inf.worldspawnKeys['_dirty']))) {
    inf.confidence.dirt = 'high';
  } else {
    inf.confidence.dirt = 'unknown';
  }

  // ── Extra sampling ──
  inf.cmdFlags.push('-extra');
  inf.confidence.extra = 'suggested';

  return inf;
}

// ── Build .ent string preserving key order ──
function buildEntString(entities, worldspawnOverrides) {
  let out = '';
  for (const ent of entities) {
    const merged = { ...ent };
    if (ent.classname === 'worldspawn') {
      // Apply overrides (replaces existing AND adds new keys)
      for (const [k, v] of Object.entries(worldspawnOverrides)) {
        merged[k] = v;
      }
      // Remove keys carrying the explicit empty/null deletion marker.
      for (const [k, v] of Object.entries(worldspawnOverrides)) {
        if (v === '' || v === null) delete merged[k];
      }
    }
    out += '{\n';
    // Use original key order, then append any new keys
    const written = new Set();
    const pairs = ent._pairs || (ent._keyOrder || Object.keys(ent)).map(k => [k, ent[k]]);
    for (const [k, originalValue] of pairs) {
      const isOverridden = ent.classname === 'worldspawn' &&
        Object.prototype.hasOwnProperty.call(worldspawnOverrides, k);
      if (isOverridden && written.has(k)) continue;
      const value = isOverridden ? merged[k] : originalValue;
      if (value === undefined || value === null) continue;
      out += `"${k}" "${value}"\n`;
      written.add(k);
    }
    // New keys from overrides
    if (ent.classname === 'worldspawn') {
      for (const k of Object.keys(worldspawnOverrides)) {
        if (!written.has(k) && merged[k] !== undefined && merged[k] !== null && merged[k] !== '') {
          out += `"${k}" "${merged[k]}"\n`;
        }
      }
    }
    out += '}\n';
  }
  return out;
}

function getEngineCompatibility(bsp, lit) {
  if (bsp.isHL) {
    return [
      ['QSS-M', 'Not applicable', 'This QSS-M tree does not load Half-Life BSP30.'],
      ['ezQuake', 'Native', 'Uses BSP30 RGB lighting directly and ignores external .lit data.'],
      ['FTEQW', 'Native', 'Uses BSP30 RGB lighting directly.']
    ];
  }
  if (lit.isLIT2) {
    return [
      ['QSS-M', 'Rejected', 'Supports external versions 1 and 0x10001 only.'],
      ['ezQuake', 'Rejected', 'Supports external version 1 only.'],
      ['FTEQW', 'Experimental', 'Version 2 exists, but this tree expects a different metadata layout than current ericw-tools writes.']
    ];
  }
  if (lit.sourceKind === 'external-lit' && lit.isHDR) {
    return [
      ['QSS-M', 'Supported', 'Loads E5BGR9 external .lit data without LDR rescaling.'],
      ['ezQuake', 'Rejected', 'Its external loader accepts version 1 only; embedded HDR is supported.'],
      ['FTEQW', 'Supported', 'Loads E5BGR9 external .lit data.']
    ];
  }
  if (lit.sourceKind === 'external-lit') {
    return [
      ['QSS-M', 'Supported', 'Uses the RGB bytes as stored.'],
      ['ezQuake', 'Supported', 'Rescales RGB against the grayscale BSP using perceived brightness.'],
      ['FTEQW', 'Supported', 'May rescale RGB against the grayscale BSP as an anti-cheat measure.']
    ];
  }
  if (lit.sourceKind.startsWith('bspx')) {
    return [
      ['QSS-M', 'Supported', 'External .lit wins; otherwise HDR BSPX wins over RGBLIGHTING.'],
      ['ezQuake', 'Supported', 'Loads inline HDR/RGB according to gl_loadlitfiles mode.'],
      ['FTEQW', 'Supported', 'Loads inline HDR/RGB, with engine-side validation/rescaling.']
    ];
  }
  return [
    ['QSS-M', 'Supported', 'Expands the grayscale BSP lump to RGB.'],
    ['ezQuake', 'Supported', 'Expands the grayscale BSP lump to RGB.'],
    ['FTEQW', 'Supported', 'Uses the native grayscale BSP lighting.']
  ];
}

function boundedNumber(value, fallback, min, max) {
  const parsed = Number.parseFloat(value);
  return Math.max(min, Math.min(max, Number.isFinite(parsed) ? parsed : fallback));
}

function firstPresent(...values) {
  for (const value of values) {
    if (value !== undefined && value !== null && String(value).trim() !== '') return value;
  }
  return undefined;
}

function settingEnabled(value) {
  const parsed = Number.parseFloat(value);
  return Number.isFinite(parsed) && parsed !== 0;
}

function normalizeNumericList(value, count, fallback) {
  const parts = String(value).trim().split(/\s+/);
  if (parts.length !== count || !parts.every(part => Number.isFinite(Number(part)))) return fallback;
  return parts.map(part => String(Number(part))).join(' ');
}

// ── Render everything ──
function renderOutput(bsp, lit, grayInfo, entities, worldspawn, lightEnts, lightStats, stats, faceAnalysis, sunInf, inferred, defaultShiftBits) {
  const out = document.getElementById('output');

  const entString = buildEntString(entities, inferred.worldspawnKeys);

  // Existing worldspawn lighting keys
  const existingWsKeys = {};

        <strong>QSS-M .ent search order:</strong> <code>${escHTML(bspName.replace(/\.bsp$/i, ''))}@${bsp.entCRCHex}.ent</code> (entity-lump CRC) then <code>${escHTML(bspName.replace(/\.bsp$/i, '.ent'))}</code>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="secondary" id="downloadEnt">Download .ent</button>
        <button class="secondary" id="downloadEntCRC">Download .ent (CRC-named)</button>
        <button class="secondary" id="downloadCmd">Download command.sh</button>
      </div>
    </div>

    <div class="section">
      <h2>Lightstyles Used</h2>
      ${(() => {
        // Collect all styles used across faces
        const usedStyles = new Set();
        for (const lm of faceAnalysis.infos) {
          if (!lm) continue;
          for (const s of lm.activeStyles) usedStyles.add(s);
        }
        const styleRows = [...usedStyles].sort((a,b) => a-b).map(s => {
          const qs = QUAKE_LIGHTSTYLES.find(q => q.id === s);
          const pattern = qs ? qs.pattern : (s >= 32 ? 'switchable (compiler-assigned)' : 'unknown');
          const desc = qs ? qs.desc : (s >= 32 ? 'Switchable light' : '');
          // Render pattern as mini brightness bar
          const bars = qs ? qs.pattern.split('').map(ch => {
            const v = (ch.charCodeAt(0) - 97) / 25;
            const bright = Math.round(v * 255);
            return '<span class="style-bar" style="width:3px;background:rgb(' + bright + ',' + bright + ',' + bright + ')"></span>';
          }).join('') : '';
          // Count faces using this style
          let faceCount = 0;
          for (const lm of faceAnalysis.infos) {
            if (lm && lm.activeStyles.includes(s)) faceCount++;
          }
          return '<tr><td>' + s + '</td><td>' + escHTML(desc) + '</td><td>' + bars + '</td><td style="font-size:0.75em;color:#52525b">' + escHTML(pattern) + '</td><td>' + faceCount + '</td></tr>';
        }).join('');
        return '<table class="style-table"><tr><th>ID</th><th>Type</th><th>Pattern</th><th>String</th><th>Faces</th></tr>' + styleRows + '</table>';
      })()}
      <div class="tip-box">
        <strong>Lightstyle encoding:</strong> Characters <code>a</code>-<code>z</code> map to brightness 0-25.
        <code>m</code> (12) = normal brightness. Style 0 is always static (fully lit).
        Styles 32+ are compiler-assigned for switchable lights.
      </div>
    </div>

    <div class="section">
      <h2>Engine Compatibility &amp; Comparison</h2>
      <table class="style-table" style="margin-bottom:14px">
        <tr><th>Engine</th><th>Status</th><th>Observed behavior in local source</th></tr>
        ${engineCompatibility.map(([engine, status, note]) =>
          `<tr><td>${escHTML(engine)}</td><td>${escHTML(status)}</td><td>${escHTML(note)}</td></tr>`
        ).join('')}
      </table>
      <div class="tip-box">
        <strong>View raw lightmaps in-engine:</strong><br>
        <code>r_lightmap 1</code> — renders lightmaps only (no textures), useful for comparing against this tool's preview<br>
        <code>r_fullbright 1</code> — disables all lighting (flat brightness)<br>
        <code>r_drawflat 1</code> — flat-shaded surfaces for checking light distribution
      </div>
      <div class="tip-box">
        <strong>Overbright &amp; gamma:</strong><br>
        <code>gl_overbright 1</code> — multiplies lightmaps by 2x (default in modern engines). Raw lighting values appear darker than in-game because of this.<br>
        <code>gamma</code> — additional display gamma correction
      </div>
      <div class="tip-box">
        <strong>External files:</strong><br>
        <code>external_ents 1</code> — enable loading .ent files (default on)<br>
        Place .ent file as: <code>${escHTML(bspName.replace(/\.bsp$/i, ''))}@${bsp.entCRCHex}.ent</code> (CRC-matched, safest) or <code>${escHTML(bspName.replace(/\.bsp$/i, '.ent'))}</code><br>
        <code>gl_loadlitfiles 1</code> — load the standard sibling <code>.lit</code> (default on)<br>
        <code>gl_loadlitfiles 2</code> + <code>external_lits_dir</code> — prefer <code>maps/&lt;dir&gt;/mapname.lit</code>, then fall back to the normal file<br>
        <code>gl_loadlitfiles 3</code> — randomly alternate between external and normal .lit for A/B checking
      </div>
      <div class="tip-box">
        <strong>Lightstyle debugging:</strong><br>
        <code>r_flatlightstyles 1</code> — use average brightness (removes flickering)<br>
        <code>r_flatlightstyles 2</code> — use peak brightness
      </div>
      <div class="tip-box">
        <strong>QSS-M load order:</strong><br>
        A valid external <code>.lit</code> wins first. If none is loaded and <code>gl_loadlitfiles &gt; 0</code>, QSS-M then falls back to BSPX lighting: <code>LIGHTING_E5BGR9</code> first, then <code>RGBLIGHTING</code>.<br>
        Wrong-size <code>.lit</code> files are rejected, and files from lower-priority game dirs are ignored.
      </div>
      <div class="stat-grid" style="margin-top:8px">
        <div class="stat-card">
          <div class="stat-label">Entity lump CRC</div>
          <div class="stat-value">0x${bsp.entCRCHex}</div>
          <div class="stat-note">QSS-M @xxxx.ent filename</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">BSPX Lighting Lumps Present</div>
          <div class="stat-value">${bsp.bspxLighting.hasHDRLighting && bsp.bspxLighting.hasRGBLighting ? 'HDR + RGB' : bsp.bspxLighting.hasHDRLighting ? 'HDR E5BGR9' : bsp.bspxLighting.hasRGBLighting ? 'RGBLIGHTING' : 'No'}</div>
          ${(bsp.bspxLighting.hasHDRLighting || bsp.bspxLighting.hasRGBLighting) ? `<div class="stat-note">active source: ${escHTML(lit.sourceLabel)}</div>` : ''}
        </div>
        <div class="stat-card">
          <div class="stat-label">BSPX LMSHIFT</div>
          <div class="stat-value">${lit.isLIT2 ? 'Overridden by LIT2' : bsp.bspxLighting.lmshifts ? 'Yes (per-face)' : `No (default ${2 ** defaultShiftBits})`}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">BSPX DECOUPLED_LM</div>
          <div class="stat-value">${bsp.bspxLighting.decoupledLM ? 'Yes' : 'No'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">BSPX Style Table</div>
          <div class="stat-value">${lit.isLIT2 ? 'Overridden by LIT2' : bsp.bspxLighting.lmstyleSource ? `${bsp.bspxLighting.lmstyleSource} (${bsp.bspxLighting.stylesPerFace}/face)` : 'No'}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Lightmap Preview</h2>
      <div class="overbright-toggle">
        <input type="checkbox" id="overbrightToggle">
        <label for="overbrightToggle" style="color:#71717a;font-size:0.8125rem">Simulate 2x overbright (matches in-engine brightness)</label>
      </div>
      <div class="tabs" id="lmTabs">
        <div class="tab active" data-tab="lmAtlas">Per-Face Atlas</div>
        <div class="tab" data-tab="lmLinear">Linear Dump</div>
      </div>
      <div class="tab-content active" id="lmAtlas">
        <p style="color:#71717a;font-size:0.8125rem;margin-bottom:6px">Each rectangle = one face's style 0 lightmap (or first stored style when style 0 is absent). Scaled 2x when it fits; preview capped at 2048px high.</p>
        <div class="lightmap-canvas-wrap">
          <canvas id="atlasCanvas"></canvas>
        </div>
      </div>
      <div class="tab-content" id="lmLinear">
        <p style="color:#71717a;font-size:0.8125rem;margin-bottom:6px">${lit.sourceKind.startsWith('bspx') ? `${lit.formatLabel} preview — first ${Math.min(lit.numSamples, 262144).toLocaleString()} samples` : lit.isHDR ? `HDR .lit preview, exposure-normalized from E5BGR9 — first ${Math.min(lit.numSamples, 262144).toLocaleString()} samples` : `Raw .lit data, linearized — first ${Math.min(lit.numSamples, 262144).toLocaleString()} samples`}</p>
        <div class="lightmap-canvas-wrap">
          <canvas id="lmCanvas"></canvas>
        </div>
      </div>
    </div>
  `;

  // ── Draw brightness histogram ──
  drawHistogram('histCanvas', 512, 130, [
    { data: stats.brightHist, color: 'rgba(161,161,170,0.7)', label: 'Gray' }
  ]);

  // ── Draw color histogram ──
  drawHistogram('colorHistCanvas', 512, 100, [
    { data: stats.rHist, color: 'rgba(255,80,80,0.6)', label: 'R' },
    { data: stats.gHist, color: 'rgba(80,255,80,0.6)', label: 'G' },
    { data: stats.bHist, color: 'rgba(80,80,255,0.6)', label: 'B' }
  ]);

  // ── Draw per-face atlas ──
  drawFaceAtlas(bsp, lit, faceAnalysis, false);

  // ── Draw linear lightmap ──
  drawLinearLightmap(lit, false);

  // ── Tab switching ──
  for (const tabGroup of ['entTabs', 'lmTabs']) {
    const container = document.getElementById(tabGroup);
    if (!container) continue;
    container.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // Only affect sibling tabs and their content
        container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const parent = container.parentElement;
        parent.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        const target = parent.querySelector('#' + tab.dataset.tab);
        if (target) target.classList.add('active');
      });
    });
  }

  // ── Dirt checkbox ──
  document.getElementById('adj_dirt').addEventListener('change', function() {
    document.getElementById('dirt_opts').style.display = this.checked ? 'block' : 'none';
    updateOutputs();
  });

  // ── Extra mutual exclusion ──
  document.getElementById('adj_extra').addEventListener('change', function() {
    if (this.checked) document.getElementById('adj_extra4').checked = false;
    updateOutputs();
  });
  document.getElementById('adj_extra4').addEventListener('change', function() {
    if (this.checked) document.getElementById('adj_extra').checked = false;
    updateOutputs();
  });

  // ── Wire up all sliders/inputs ──
  const sliders = {
    adj_minlight: 'int', adj_sunlight: 'int', adj_penumbra: 'int',
    adj_sunlight2: 'int', adj_sunlight3: 'int',
    adj_bounce: 'int', adj_soft: 'int', adj_dirtdepth: 'int',
    adj_dist: 'pct', adj_range: 'pct', adj_gamma: 'pct', adj_anglescale: 'pct',
    adj_bouncescale: 'pct', adj_bouncecolor: 'pct',
    adj_dirtscale: 'pct', adj_dirtgain: 'pct'
  };
  for (const [id, type] of Object.entries(sliders)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.addEventListener('input', function() {
      const valEl = document.getElementById(id + '_val');
      if (valEl) valEl.textContent = type === 'pct' ? (this.value / 100).toFixed(2) : this.value;
      updateOutputs();
    });
  }
  for (const id of ['adj_sunmangle', 'adj_suncolor', 'adj_mincolor']) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateOutputs);
  }

  // ── Live update ──
  function updateOutputs() {
    const ws = {};
    // A slider at its compiler default means "remove the override", including
    // an existing key in the source entity lump. Null is buildEntString's
    // explicit deletion marker.
    for (const key of [
      'light', '_minlight', '_minlight_color', '_mincolor',
      '_sunlight', '_sun_light', '_sunlight_mangle', '_sun_mangle', '_sun_angle',
      '_sunlight_color', '_sun_color', '_sunlight_penumbra',
      '_sunlight2', '_sunlight3',
      '_bounce', '_bouncescale', '_bouncecolorscale',
      '_dist', '_range', '_gamma', '_anglescale', '_anglesense',
      '_dirt', '_dirty', '_dirtdepth', '_dirtscale', '_dirtgain'
    ]) ws[key] = null;

    // Minlight
    const ml = parseInt(document.getElementById('adj_minlight').value);
    if (ml !== 0) ws['_minlight'] = String(ml);
    const mlc = normalizeNumericList(document.getElementById('adj_mincolor').value, 3, '255 255 255');
    if (ml !== 0 && mlc && mlc !== '255 255 255') ws['_minlight_color'] = mlc;

    // Sunlight
    const sl = parseInt(document.getElementById('adj_sunlight').value);
    if (sl !== 0) {
      ws['_sunlight'] = String(sl);
      ws['_sunlight_mangle'] = normalizeNumericList(document.getElementById('adj_sunmangle').value, 3, '0 -90 0');
      const sc = normalizeNumericList(document.getElementById('adj_suncolor').value, 3, '255 255 255');
      if (sc && sc !== '255 255 255') ws['_sunlight_color'] = sc;
      const pen = parseInt(document.getElementById('adj_penumbra').value);
      if (pen > 0) ws['_sunlight_penumbra'] = String(pen);
    }

    const sl2 = parseInt(document.getElementById('adj_sunlight2').value);
    if (sl2 !== 0) ws['_sunlight2'] = String(sl2);
    const sl3 = parseInt(document.getElementById('adj_sunlight3').value);
    if (sl3 !== 0) ws['_sunlight3'] = String(sl3);

    // Bounce
    const bounce = parseInt(document.getElementById('adj_bounce').value);
    if (bounce > 0) {
      ws['_bounce'] = String(bounce);
      const bs = parseInt(document.getElementById('adj_bouncescale').value);
      if (Math.abs(bs - 100) > 1) ws['_bouncescale'] = (bs / 100).toFixed(2);
      const bc = parseInt(document.getElementById('adj_bouncecolor').value);
      if (bc > 0) ws['_bouncecolorscale'] = (bc / 100).toFixed(2);
    }

    // Global
    const dist = parseInt(document.getElementById('adj_dist').value) / 100;
    if (Math.abs(dist - 1.0) > 0.01) ws['_dist'] = dist.toFixed(2);
    const range = parseInt(document.getElementById('adj_range').value) / 100;
    if (Math.abs(range - 0.5) > 0.01) ws['_range'] = range.toFixed(2);
    const gamma = parseInt(document.getElementById('adj_gamma').value) / 100;
    if (Math.abs(gamma - 1.0) > 0.01) ws['_gamma'] = gamma.toFixed(2);
    const as = parseInt(document.getElementById('adj_anglescale').value) / 100;
    if (Math.abs(as - 0.5) > 0.01) ws['_anglescale'] = as.toFixed(2);

    // Dirt
    if (document.getElementById('adj_dirt').checked) {
      ws['_dirt'] = '1';
      ws['_dirtdepth'] = document.getElementById('adj_dirtdepth').value;
      const dscale = parseInt(document.getElementById('adj_dirtscale').value);
      if (Math.abs(dscale - 100) > 1) ws['_dirtscale'] = (dscale / 100).toFixed(2);
      const dgain = parseInt(document.getElementById('adj_dirtgain').value);
      if (Math.abs(dgain - 100) > 1) ws['_dirtgain'] = (dgain / 100).toFixed(2);
    }

    // Command line flags
    const flags = [];
    if (inferred.outputFlag) flags.push(inferred.outputFlag);
    const useExtra4 = document.getElementById('adj_extra4').checked;
    const useExtra = document.getElementById('adj_extra').checked;
    if (useExtra4) flags.push('-extra4');
    else if (useExtra) flags.push('-extra');
    const soft = parseInt(document.getElementById('adj_soft').value);
    if (soft > 0) flags.push('-soft', String(soft));

    const cmdStr = ['light', ...flags, bspName].map(shellQuote).join(' \\\n  ');
    document.getElementById('cmdText').textContent = cmdStr;

    // Build .ent
    const newEntStr = buildEntString(entities, ws);
    document.getElementById('entText').textContent = newEntStr;

    // Worldspawn-only view
    const wsLines = [];
    const mergedWs = { ...worldspawn, ...ws };
    for (const [k, v] of Object.entries(ws)) {
      if (v === null || v === '') delete mergedWs[k];
    }
    for (const [k, v] of Object.entries(mergedWs)) {
      if (k === '_keyOrder' || k === 'classname') continue;
      if (k === 'light' || lightingPrefixes.some(p => k.startsWith(p))) {
        const isOverride = Object.prototype.hasOwnProperty.call(ws, k);
        wsLines.push(`${isOverride ? '* ' : '  '}"${k}" "${v}"`);
      }
    }
    document.getElementById('entWsText').textContent =
      wsLines.length > 0 ? '// * = modified by adjustments\n' + wsLines.join('\n') : '// No lighting keys';

    wireDownloads(newEntStr, cmdStr);
  }

  function wireDownloads(entStr, cmdStr) {
    document.getElementById('downloadEnt').onclick = () =>
      download(bspName.replace(/\.bsp$/i, '.ent'), entStr);
    document.getElementById('downloadEntCRC').onclick = () =>
      download(bspName.replace(/\.bsp$/i, '') + '@' + bsp.entCRCHex + '.ent', entStr);
    document.getElementById('downloadCmd').onclick = () =>
      download('light_command.sh', '#!/bin/sh\n' + cmdStr + '\n');
  }

  // ── Overbright toggle for lightmap preview ──
  document.getElementById('overbrightToggle').addEventListener('change', function() {
    drawFaceAtlas(bsp, lit, faceAnalysis, this.checked);
    drawLinearLightmap(lit, this.checked);
  });

  // Initial render
  updateOutputs();
}

// ── Histogram drawing ──
function drawHistogram(canvasId, w, h, channels) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#09090b';
  ctx.fillRect(0, 0, w, h);

  // Find global max
  let globalMax = 0;
  for (const ch of channels) {
    for (let i = 1; i < 256; i++) { // skip 0 to avoid dark-sample spike dominating
      if (ch.data[i] > globalMax) globalMax = ch.data[i];
    }
  }
  if (globalMax === 0) return;

  const barW = w / 256;
  for (const ch of channels) {
    ctx.fillStyle = ch.color;
    for (let i = 0; i < 256; i++) {
      const barH = (ch.data[i] / globalMax) * (h - 16);
      ctx.fillRect(i * barW, h - barH, barW, barH);
    }
  }

  // Labels
  ctx.font = '10px monospace';
  ctx.fillStyle = '#52525b';
  ctx.fillText('0', 2, h - 2);
  ctx.fillText('255', w - 22, h - 2);
  for (let i = 0; i < channels.length; i++) {
    ctx.fillStyle = channels[i].color;
    ctx.fillText(channels[i].label, w - 40 - i * 20, 12);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.strokeRect(0, 0, w, h);
}

// ── Per-face lightmap atlas ──
function drawFaceAtlas(bsp, lit, faceAnalysis, overbright) {
  const canvas = document.getElementById('atlasCanvas');
  if (!canvas) return;

  const PAD = 1;
  const ATLAS_W = 512;
  const ATLAS_MAX_H = 2048;

  // Pack face lightmaps into rows
  let curX = 0, curY = 0, rowH = 0;
  const placements = [];

  for (let fi = 0; fi < bsp.faces.length; fi++) {
    const lm = faceAnalysis.infos[fi];
    if (!lm || lm.lightofs < 0) continue;

    const scale = lm.width * 2 <= ATLAS_W ? 2 : 1;
    const pw = lm.width * scale, ph = lm.height * scale;
    // Extended/decoupled lightmaps may be wider than this diagnostic atlas.
    // Omitting them is preferable to writing past one row into the next.
    if (pw > ATLAS_W || ph > ATLAS_MAX_H) continue;
    if (curX > 0 && curX + pw > ATLAS_W) {
      curX = 0;
      curY += rowH + PAD;
      rowH = 0;
    }
    if (curY + ph > ATLAS_MAX_H) break;
    placements.push({ fi, x: curX, y: curY, w: lm.width, h: lm.height, pw, ph, scale });
    curX += pw + PAD;
    if (ph > rowH) rowH = ph;
  }

  const totalH = curY + rowH + PAD;
  canvas.width = ATLAS_W;
  canvas.height = Math.max(1, Math.min(totalH, ATLAS_MAX_H));
  canvas.style.width = ATLAS_W + 'px';
  canvas.style.height = canvas.height + 'px';

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#09090b';
  ctx.fillRect(0, 0, ATLAS_W, canvas.height);

  const imgData = ctx.createImageData(ATLAS_W, canvas.height);

  for (const p of placements) {
    const lm = faceAnalysis.infos[p.fi];
    const styleOffset = getFaceStyleOffset(lm, 0, true);
    if (styleOffset < 0) continue;

    for (let ly = 0; ly < p.h; ly++) {
      for (let lx = 0; lx < p.w; lx++) {
        const sampleIdx = styleOffset + ly * p.w + lx;
        if (sampleIdx >= lit.numSamples) continue;

        let r = lit.data[sampleIdx * 3];
        let g = lit.data[sampleIdx * 3 + 1];
        let b = lit.data[sampleIdx * 3 + 2];
        if (overbright) { r = Math.min(255, r * 2); g = Math.min(255, g * 2); b = Math.min(255, b * 2); }

        // Draw scaled pixel
        for (let sy = 0; sy < p.scale; sy++) {
          for (let sx = 0; sx < p.scale; sx++) {
            const px = p.x + lx * p.scale + sx;
            const py = p.y + ly * p.scale + sy;
            if (px >= ATLAS_W || py >= canvas.height) continue;
            const off = (py * ATLAS_W + px) * 4;
            imgData.data[off] = r;
            imgData.data[off + 1] = g;
            imgData.data[off + 2] = b;
            imgData.data[off + 3] = 255;
          }
        }
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

// ── Linear lightmap dump ──
function drawLinearLightmap(lit, overbright) {
  const canvas = document.getElementById('lmCanvas');
  if (!canvas) return;

  const maxPx = Math.min(lit.numSamples, 262144);
  const atlasW = 512;
  const atlasH = Math.ceil(maxPx / atlasW);
  canvas.width = atlasW;
  canvas.height = Math.max(1, atlasH);
  canvas.style.width = atlasW + 'px';
  canvas.style.height = canvas.height + 'px';

  const mul = overbright ? 2 : 1;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(atlasW, canvas.height);
  for (let i = 0; i < maxPx; i++) {
    const off = i * 4;
    imgData.data[off]     = Math.min(255, lit.data[i * 3] * mul);
    imgData.data[off + 1] = Math.min(255, lit.data[i * 3 + 1] * mul);
    imgData.data[off + 2] = Math.min(255, lit.data[i * 3 + 2] * mul);
    imgData.data[off + 3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function escHTML(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function shellQuote(value) {
  const s = String(value);
  if (/^[A-Za-z0-9_./:@%+=,-]+$/.test(s)) return s;
  return `'${s.replace(/'/g, `'"'"'`)}'`;
}

function download(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copyText(spanId) {
  const el = document.getElementById(spanId);
  if (el) navigator.clipboard.writeText(el.textContent.trim());
}
