cfg_reset 
unbindall

cl_download_mapsrc https://qw-ctf.github.io/qtubetest/id1/maps/

// Use the built-in centered Quake status bar instead of ezhud/plugin HUDs.
set plug_sbar 0
cvarreset hud_*
cl_sbar 1
viewsize 100
scr_centersbar 1
hud_miniscores_show 0
hud_tracking_show 0
hud_teaminfo_show 0
hud_teaminfo_show_enemies 0
sbar_teamstatus 0
scr_autoid_health 0
scr_autoid_armor 0
scr_autoid_weapon 0
scr_autoid_weapon_mask 0
gl_load24bit 0
r_replacemodels ""
ruleset_allow_sensitive_texture_replacements 0
cl_nocsqc 1
cl_download_csprogs 0
scr_scoreboard_newstyle 0
scr_scoreboard_teamscores 0
scr_scoreboard_showflags 0
scr_scoreboard_showhealth 0
scr_scoreboard_showweapon 0
scr_scoreboard_showlocation 0
scr_scoreboard_showruleset 0

r_particledesc classic

r_wateralpha 0.3
r_lavaalpha 0.3
r_slimealpha 0.3
r_telealpha 0.7

gl_flashblend 0
gl_polyblend 0
cl_muzzleflash 0
v_contentblend 0

r_novis 1 // in contrast to ezq, no perf hit

// WebGL cannot use browser hardware gamma ramps, so force the GLSL/canvas path.
vid_hardwaregamma 2
v_gammainverted 1
gamma 2
v_gamma 2
contrast 0.9
v_contrast 0.9
v_contrastboost 1
brightness 0.12
v_brightness 0.12
gl_overbright 2
r_lightstylescale 2.5

r_viewmodel_fov 105
fov 105
r_drawviewmodel 1

// Browser native float audio
snd_samplebits 32
volume 0.01
s_ambientfade 0
s_ambientlevel 0
cl_chatsound 0

cl_yieldcpu 1

cl_bobup 0
cl_rollangle 0
v_kickroll 0
v_kickpitch 0

cl_truelightning 0

vid_conautoscale 4
con_timestamps 0
con_notifylines 4
con_notifytime 5
scr_scoreboard_showfrags 0

gl_specular 0
vid_srgb 0
r_hdr_framebuffer 0
r_hdr_irisadaption 0
r_hdr_irisadaptation 0
r_bloom 0
r_coronas 0
r_dynamic 0
r_vertexdlights 0
r_loadlit 0
r_lightmap_saturation 0
r_loadsurfenvmaps 0
r_glsl_pbr 0
r_glsl_offsetmapping 0
r_glsl_offsetmapping_reliefmapping 0
r_shadow_realtime_dlight 0
r_shadow_realtime_dlight_shadows 0
r_shadow_realtime_dlight_ambient 0
r_shadow_realtime_dlight_diffuse 0
r_shadow_realtime_dlight_specular 0
r_shadow_realtime_world 0
r_shadow_realtime_world_shadows 0
r_shadow_realtime_world_lightmaps 1
r_shadow_realtime_world_importlightentitiesfrommap 0
r_shadow_shadowmapping 0
r_shadow_raytrace 0
r_shadow_playershadows 0
r_shadows 0
r_deluxemapping 0
r_shadow_bumpscale_basetexture 0
r_shadow_bumpscale_bumpmap 0
r_shadow_heightscale_basetexture 0
r_shadow_heightscale_bumpmap 0
r_fullbrightSkins 1
v_powerupshell 0.15
r_waterwarp 0

r_tracker_x 0.01
r_tracker_frags 0
msg_filter_frags 1
cl_gibfilter 0
cl_deadbodyfilter 0

crosshair 1
crosshairimage ""
crosshaircolor 255 255 255
crosshairsize 8

// Fixes bad playback pace
cl_maxfps_slop 0

// no smearing of map nor UI textures
gl_texturemode2d gl_nearest
gl_texturemode gl_nearest_mipmap_linear

alias f_specmapend demo_setspeed 0

set tp_name_sg "&cff0sg"
set tp_name_ssg "&cf55ssg"
set tp_name_ng "&c9beng"
set tp_name_sng "&cc5fsng"
