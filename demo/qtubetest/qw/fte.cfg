cfg_reset
unbindall

// downloads / compatibility
cl_download_mapsrc https://qw-ctf.github.io/qtubetest/id1/maps/
cl_nocsqc 1
cl_download_csprogs 0
gl_load24bit 0
r_replacemodels ""
ruleset_allow_sensitive_texture_replacements 0

// built-in classic HUD
set plug_sbar 0
cvarreset hud_*
cl_sbar 2
viewsize 100
scr_centersbar 1
cl_sbaralpha 1
hud_miniscores_show 0
hud_tracking_show 0
hud_teaminfo_show 0
hud_teaminfo_show_enemies 0
sbar_teamstatus 0
scr_autoid_health 0
scr_autoid_armor 0
scr_autoid_weapon 0
scr_autoid_weapon_mask 0

// console / demo messages
msg 0
msg_filter 0
msg_filter_frags 0
msg_filter_pickups 0
con_timestamps 0
con_notifylines 8
con_notifytime 6
con_notify_x 0
con_notify_y 0
con_notify_w 1
vid_conautoscale 4

// scoreboard
scr_scoreboard_newstyle 0
scr_scoreboard_teamscores 0
scr_scoreboard_showflags 0
scr_scoreboard_showhealth 0
scr_scoreboard_showweapon 0
scr_scoreboard_showlocation 0
scr_scoreboard_showruleset 0
scr_scoreboard_showfrags 0

// video / brightness
vid_fullscreen 0
vid_width 640
vid_height 480
vid_hardwaregamma 2
v_gammainverted 1
gamma 1.5
v_gamma 1.5
brightness 0.06
v_brightness 0.06
contrast 1.05
v_contrast 1.05
gl_overbright 1
r_lightstylescale 2

// classic visuals
r_particledesc classic
r_novis 1
r_wateralpha 0.3
r_lavaalpha 0.3
r_slimealpha 0.3
r_telealpha 0.7
r_waterwarp 0
gl_flashblend 0
gl_polyblend 0
v_contentblend 0
cl_muzzleflash 0
r_dynamic 0
r_vertexdlights 0
r_coronas 0
gl_specular 0
r_bloom 0
r_hdr_framebuffer 0
r_hdr_irisadaption 0
r_hdr_irisadaptation 0
r_loadlit 0
r_lightmap_saturation 1
r_loadsurfenvmaps 0
r_glsl_pbr 0
r_glsl_offsetmapping 0
r_glsl_offsetmapping_reliefmapping 0
r_shadow_realtime_dlight 0
r_shadow_realtime_dlight_shadows 0
r_shadow_realtime_dlight_ambient 0
r_shadow_realtime_dlight_diffuse 0
r_shadow_realtime_dlight_specular 0
r_shadow_realtime_world 0
r_shadow_realtime_world_shadows 0
r_shadow_realtime_world_lightmaps 1
r_shadow_realtime_world_importlightentitiesfrommap 0
r_shadow_shadowmapping 0
r_shadow_raytrace 0
r_shadow_playershadows 0
r_shadows 0
r_deluxemapping 0
r_shadow_bumpscale_basetexture 0
r_shadow_bumpscale_bumpmap 0
r_shadow_heightscale_basetexture 0
r_shadow_heightscale_bumpmap 0
vid_srgb 0
r_fullbrightSkins 1
v_powerupshell 0.15

// view / movement
fov 105
r_viewmodel_fov 105
r_drawviewmodel 1
cl_bobup 0
cl_rollangle 0
v_kickroll 0
v_kickpitch 0
cl_truelightning 0
cl_maxfps_slop 0

// audio
snd_samplebits 32
volume 0.01
s_ambientfade 0
s_ambientlevel 0
cl_chatsound 0
cl_yieldcpu 1

// gameplay clutter
cl_gibfilter 0
cl_deadbodyfilter 0
r_tracker_frags 0

// crosshair
crosshair 1
crosshairimage ""
crosshaircolor 255 255 255
crosshairsize 8

// texture filtering
gl_texturemode2d gl_nearest
gl_texturemode gl_nearest_mipmap_linear

alias f_specmapend demo_setspeed 0
