<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quake Demo Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f10;
      --panel: #15191a;
      --panel-border: #2b3436;
      --text: #edf2ee;
      --muted: #a9b4b0;
      --accent: #66d9c1;
      --accent-strong: #7ce8d2;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(102, 217, 193, 0.08), transparent 28rem),
        linear-gradient(135deg, #0d0f10 0%, #141817 55%, #101214 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .demo-card {
      display: grid;
      gap: 16px;
      min-height: 170px;
      padding: 18px;
      background: rgba(21, 25, 26, 0.94);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 18px 40px var(--shadow);
    }

    .demo-card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .filename {
      margin: 0;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .launch {
      align-self: end;
      justify-self: start;
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid #8af2df;
      border-radius: 6px;
      background: var(--accent);
      color: #071311;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    .launch:hover,
    .launch:focus-visible {
      background: var(--accent-strong);
      outline: none;
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 24px, 900px);
        padding: 28px 0;
      }

      h1 {
        font-size: 28px;
      }

    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Quake Demo Player</h1>
    </header>

    <section aria-label="Demo player">
      <article class="demo-card">
        <div>
          <h2>Drop a demo to play it</h2>
          <p class="filename">Use the /demo tool to launch this player with a .dem file.</p>
        </div>
        <p class="meta">Maps are loaded from /maps, built-in packages, or packages dropped with the demo.</p>
        <a class="launch" href="../">Open Demo Tool</a>
      </article>
    </section>
  </main>
</body>
</html>
