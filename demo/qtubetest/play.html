<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FTE Demo Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c0c;
      --text: #edf2ee;
      --muted: #a9b4b0;
      --border: #2d2f2f;
      --accent: #d48f52;
      --accent-track: #2f241f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 16px 20px 18px;
    }

    .topbar {
      width: var(--player-width, 640px);
      max-width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      min-width: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .viewport {
      width: var(--player-width, 640px);
      height: var(--player-height, 480px);
      max-width: 100%;
      aspect-ratio: 4 / 3;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
      outline: 1px solid var(--border);
    }

    .viewport:fullscreen,
    .viewport:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      max-width: none;
      aspect-ratio: auto;
      outline: 0;
    }

    .viewport:fullscreen canvas.emscripten,
    .viewport:-webkit-full-screen canvas.emscripten {
      width: min(100vw, calc(100vh * 4 / 3));
      height: min(100vh, calc(100vw * 3 / 4));
    }

    canvas.emscripten {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      aspect-ratio: 4 / 3;
      border: 0;
      margin: 0;
      padding: 0;
      background: #000;
    }

    .player-overlay {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 13px 18px 14px;
      background: linear-gradient(180deg, rgba(13, 11, 10, 0), rgba(19, 16, 14, 0.88) 38%, rgba(19, 16, 14, 0.94));
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
      z-index: 2;
    }

    .viewport:hover .player-overlay,
    .viewport:focus-within .player-overlay,
    .viewport.overlay-visible .player-overlay {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .volume-control {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .overlay-button {
      appearance: none;
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #f2e2d0;
      padding: 0;
      cursor: pointer;
      transition: background-color 0.16s ease, color 0.16s ease, opacity 0.16s ease;
    }

    .overlay-button:hover:not(:disabled),
    .overlay-button:focus-visible:not(:disabled) {
      background: rgba(212, 143, 82, 0.18);
      color: #fff5e8;
      outline: 0;
    }

    .overlay-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .overlay-button svg {
      width: 25px;
      height: 25px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .volume-off-icon,
    .fullscreen-exit-icon {
      display: none;
    }

    .volume-toggle.is-muted .volume-on-icon,
    .fullscreen-button.is-fullscreen .fullscreen-enter-icon {
      display: none;
    }

    .volume-toggle.is-muted .volume-off-icon,
    .fullscreen-button.is-fullscreen .fullscreen-exit-icon {
      display: block;
    }

    .volume-slider {
      width: clamp(110px, 18vw, 190px);
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .volume-slider:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .controls {
      width: var(--player-width, 640px);
      max-width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .loading-controls {
      width: 100%;
      min-height: 35px;
      display: grid;
      align-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .playback-controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .playback-button-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .shortcut-key {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      text-align: center;
    }

    .shortcut-key kbd {
      display: inline-block;
      min-width: 18px;
      margin: 0 2px;
      padding: 1px 5px;
      border: 1px solid #51443b;
      border-radius: 4px;
      background: #171412;
      color: #f2e2d0;
      font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .controls button {
      appearance: none;
      min-width: 64px;
      border: 1px solid #705948;
      border-radius: 6px;
      background: linear-gradient(180deg, #6f4f3d, #4f3a2f);
      color: #f2e2d0;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, opacity 0.16s ease;
    }

    .controls button:hover:not(:disabled),
    .controls button:focus-visible:not(:disabled) {
      border-color: #d39a68;
      transform: translateY(-1px);
    }

    .controls button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .speed-select {
      appearance: none;
      width: var(--speed-select-width, 58px);
      min-width: 58px;
      border: 1px solid #705948;
      border-radius: 6px;
      background:
        linear-gradient(45deg, transparent 50%, #f2e2d0 50%) right 12px center / 6px 6px no-repeat,
        linear-gradient(135deg, #f2e2d0 50%, transparent 50%) right 8px center / 6px 6px no-repeat,
        linear-gradient(180deg, #6f4f3d, #4f3a2f);
      color: #f2e2d0;
      padding: 8px 26px 8px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .speed-select:focus-visible {
      border-color: #d39a68;
      outline: 0;
    }

    .speed-select:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .playback-time {
      min-width: 58px;
      color: var(--muted);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      text-align: right;
    }

    #progress {
      width: 100%;
      height: 8px;
      accent-color: var(--accent);
      border: 0;
      border-radius: 999px;
      background: var(--accent-track);
      overflow: hidden;
    }

    #progress::-webkit-progress-bar {
      background: var(--accent-track);
      border-radius: 999px;
    }

    #progress::-webkit-progress-value {
      background: var(--accent);
      border-radius: 999px;
    }

    #progress::-moz-progress-bar {
      background: var(--accent);
      border-radius: 999px;
    }

    .error {
      width: 640px;
      max-width: 100%;
      padding: 12px 14px;
      border: 1px solid #754640;
      border-radius: 6px;
      background: #21100f;
      color: #ffd5cd;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1 id="demo-title">FTE Demo Player</h1>
    </div>

    <div class="viewport">
      <canvas class="emscripten" id="canvas" width="640" height="480" tabindex="-1" aria-hidden="true" oncontextmenu="event.preventDefault()"></canvas>
      <div id="playerOverlay" class="player-overlay" aria-label="Player overlay controls" hidden>
        <div class="volume-control">
          <button id="volumeToggle" class="overlay-button volume-toggle" type="button" aria-label="Mute" title="Mute" disabled>
            <svg class="volume-on-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M18.5 6a9 9 0 0 1 0 12"></path>
            </svg>
            <svg class="volume-off-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
              <path d="m16 9 5 5"></path>
              <path d="m21 9-5 5"></path>
            </svg>
          </button>
          <input id="volumeSlider" class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.05" aria-label="Volume" disabled>
        </div>
        <button id="fullscreenButton" class="overlay-button fullscreen-button" type="button" aria-label="Enter fullscreen" title="Enter fullscreen" disabled>
          <svg class="fullscreen-enter-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H3v5"></path>
            <path d="M16 3h5v5"></path>
            <path d="M21 16v5h-5"></path>
            <path d="M8 21H3v-5"></path>
          </svg>
          <svg class="fullscreen-exit-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 3v6H3"></path>
            <path d="M15 3v6h6"></path>
            <path d="M21 15h-6v6"></path>
            <path d="M3 15h6v6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="controls" aria-live="polite">
      <div id="loadingControls" class="loading-controls">
        <div id="status">Preparing player...</div>
        <progress value="0" max="100" id="progress" hidden></progress>
      </div>
      <div id="playbackControls" class="playback-controls" aria-label="Playback controls" hidden>
        <div class="playback-button-row">
          <button type="button" data-player-control="back" disabled>-2s</button>
          <button id="playPauseButton" type="button" data-player-control="toggle-playback" disabled>Pause</button>
          <select id="speedSelect" class="speed-select" aria-label="Demo speed" disabled>
            <option value="25">0.25x</option>
            <option value="50">0.5x</option>
            <option value="75">0.75x</option>
            <option value="100" selected>1x</option>
            <option value="150">1.5x</option>
            <option value="200">2x</option>
            <option value="400">4x</option>
          </select>
          <button type="button" data-player-control="forward" disabled>+2s</button>
          <span id="playback-time" class="playback-time">--:--</span>
        </div>
        <div class="shortcut-key" aria-label="Keyboard shortcuts">
          <kbd>0</kbd>restart
          <kbd>1</kbd>-<kbd>9</kbd>jump
          <kbd>,</kbd><kbd>.</kbd>frame
          <kbd>Tab</kbd>scores
        </div>
      </div>
    </div>
    <div id="error" class="error" hidden></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="quake106.js?v=20260506a"></script>
  <script src="../dzip.js?v=20260321b"></script>
  <script src="../parser.js?v=20260321b"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var statusElement = document.getElementById("status");
    var progressElement = document.getElementById("progress");
    var errorElement = document.getElementById("error");
    var canvas = document.getElementById("canvas");
    var playerViewport = document.querySelector(".viewport");
    var playerOverlay = document.getElementById("playerOverlay");
    var volumeToggle = document.getElementById("volumeToggle");
    var volumeSlider = document.getElementById("volumeSlider");
    var fullscreenButton = document.getElementById("fullscreenButton");
    var loadingControlsElement = document.getElementById("loadingControls");
    var playbackControlsElement = document.getElementById("playbackControls");
    var controlButtons = Array.prototype.slice.call(document.querySelectorAll("[data-player-control]"));
    var playPauseButton = document.getElementById("playPauseButton");
    var speedSelect = document.getElementById("speedSelect");
    var playbackTimeElement = document.getElementById("playback-time");
    var PAK1_REQUIRED_MAP_PATTERN = /^(?:e[34]m[0-9]+|dm[1-6])$/i;
    var PLAYER_VERTICAL_MARGIN = 36;
    var INITIAL_VOLUME = 0.05;
    var currentVolume = INITIAL_VOLUME;
    var previousAudibleVolume = INITIAL_VOLUME;
    var playbackPaused = false;
    var playbackSpeed = 100;
    var pauseMutedAutomatically = false;
    var pauseResumeVolume = INITIAL_VOLUME;
    var overlayHideTimer = 0;
    var LONG_PRESS_SHOWSCORES_MS = 450;
    var showscoresDown = false;
    var keyboardShowscoresDown = false;
    var pointerShowscoresDown = false;
    var longPressTimer = 0;
    var longPressPointerId = null;
    var ENGINE_CONTROL_COMMANDS = {
      back: "demo_jump -2",
      forward: "demo_jump +2"
    };
    var BUILT_IN_PACKAGES = [
      {
        file: "ctf.pk3",
        source: "../../paks/ctf.pk3",
        maps: [
          "ctf1.bsp", "ctf2.bsp", "ctf3.bsp", "ctf4.bsp", "ctf5.bsp", "ctf6.bsp", "ctf7.bsp", "ctf8.bsp", "ctfstart.bsp",
          "ctf2m1.bsp", "ctf2m2.bsp", "ctf2m3.bsp", "ctf2m4.bsp", "ctf2m5.bsp", "ctf2m6.bsp", "ctf2m7.bsp", "ctf2m8.bsp",
          "ctf3m1.bsp", "ctf3m2.bsp", "ctf3m3.bsp", "ctf3m4.bsp", "ctf3m5.bsp", "ctf3m6.bsp", "ctf3m7.bsp", "ctf3m8.bsp", "ctf3m9.bsp"
        ],
        providesPak1Maps: false
      },
      {
        file: "ra.pk3",
        source: "../../paks/ra.pk3",
        maps: [
          "23ar-a.bsp", "2pyramid.bsp", "2towers.bsp", "arendm1a.bsp", "arenarg2.bsp", "arenarg4.bsp", "arenarg5.bsp",
          "arenarg6.bsp", "arenax.bsp", "arenazap.bsp", "arenrg3a.bsp", "arma4.bsp", "barena1.bsp", "basarena.bsp",
          "bbarena2.bsp", "bunmoo3.bsp", "bunski.bsp", "chamber1.bsp", "crandome.bsp", "dm2arena.bsp", "dom2_1ra.bsp",
          "egyptra.bsp", "football.bsp", "gear8.bsp", "gearpr0n.bsp", "gnurena.bsp", "hill20.bsp", "iarena2.bsp",
          "id3.bsp", "lowgrav.bsp", "marena2.bsp", "marena3.bsp", "marena4.bsp", "mayan1.bsp", "nilsrar3.bsp",
          "pen2.bsp", "pitarena.bsp", "ptucket.bsp", "ra_funkf.bsp", "rarena3.bsp", "rgarden.bsp", "soyarena.bsp",
          "terrain2.bsp", "uarena1.bsp", "unholy.bsp", "xarena3.bsp", "yard1.bsp"
        ],
        providesPak1Maps: false
      }
    ];
    var demoConfigSource = "qw/fte.cfg?" + Date.now();
    var DEFAULT_RENDER_CONFIG = {
      gamma: 1.25,
      contrast: 1,
      contrastBoost: 1,
      brightness: 0.02
    };

    function cleanValue(value) {
      return String(value || "").trim().replace(/^["']|["']$/g, "").trim();
    }

    function clampNumber(value, min, max, fallback) {
      var number = Number(value);
      if (!Number.isFinite(number)) {
        return fallback;
      }
      return Math.max(min, Math.min(max, number));
    }

    function normalizeDuration(value) {
      var text = cleanValue(value);
      var parts;
      var number;
      var total = 0;
      var index;

      if (!text) {
        return 0;
      }
      if (/^\d+(?::\d+(?:\.\d+)?){1,2}$/.test(text)) {
        parts = text.split(":");
        for (index = 0; index < parts.length; index++) {
          total = (total * 60) + Number(parts[index]);
        }
        return Number.isFinite(total) && total > 0 ? total : 0;
      }

      number = Number(text);
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function stripFteComment(line) {
      var quoted = false;
      for (var i = 0; i < line.length; i++) {
        var char = line.charAt(i);
        if (char === "\"" && line.charAt(i - 1) !== "\\") {
          quoted = !quoted;
        } else if (!quoted && char === "/" && line.charAt(i + 1) === "/") {
          return line.slice(0, i);
        }
      }
      return line;
    }

    function parseFteConfigAssignments(text) {
      var assignments = {};
      String(text || "").split(/\r?\n/).forEach(function(rawLine) {
        var line = stripFteComment(rawLine).trim();
        var match;
        var command;
        var name;
        var value;

        if (!line) {
          return;
        }

        match = line.match(/^(\S+)(?:\s+(.+))?$/);
        if (!match) {
          return;
        }

        command = match[1].toLowerCase();
        value = match[2] || "";
        if (command === "set" || command === "seta" || command === "seta_weak") {
          match = value.match(/^(\S+)(?:\s+(.+))?$/);
          if (!match) {
            return;
          }
          name = match[1].toLowerCase();
          value = match[2] || "";
        } else {
          name = command;
        }

        assignments[name] = cleanValue(value);
      });
      return assignments;
    }

    function configNumber(assignments, names, fallback) {
      for (var i = 0; i < names.length; i++) {
        var raw = assignments[names[i]];
        var match = cleanValue(raw).match(/^-?(?:\d+\.?\d*|\.\d+)/);
        if (match) {
          return Number(match[0]);
        }
      }
      return fallback;
    }

    function applyCanvasRenderConfig(config) {
      var gamma = clampNumber(config.gamma, 0.2, 3, DEFAULT_RENDER_CONFIG.gamma);
      var contrast = clampNumber(config.contrast, 0.25, 4, DEFAULT_RENDER_CONFIG.contrast);
      var boost = clampNumber(config.contrastBoost, 0.25, 4, DEFAULT_RENDER_CONFIG.contrastBoost);
      var brightness = clampNumber(config.brightness, -0.5, 0.5, DEFAULT_RENDER_CONFIG.brightness);
      var cssBrightness = clampNumber(1 + ((gamma - 1) * 0.22) + brightness, 0.75, 1.16, 1);
      var cssContrast = clampNumber(contrast * Math.pow(boost, 0.15), 0.85, 1.15, 1);

      if (Math.abs(cssBrightness - 1) < 0.01 && Math.abs(cssContrast - 1) < 0.01) {
        canvas.style.filter = "";
        return;
      }

      canvas.style.filter = "brightness(" + cssBrightness.toFixed(3) + ") contrast(" + cssContrast.toFixed(3) + ")";
    }

    function loadCanvasRenderConfig() {
      return fetch(demoConfigSource, {
        cache: "no-store"
      }).then(function(response) {
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        return response.text();
      }).then(function(text) {
        var assignments = parseFteConfigAssignments(text);
        applyCanvasRenderConfig({
          gamma: configNumber(assignments, ["gamma", "v_gamma"], DEFAULT_RENDER_CONFIG.gamma),
          contrast: configNumber(assignments, ["contrast", "v_contrast"], DEFAULT_RENDER_CONFIG.contrast),
          contrastBoost: configNumber(assignments, ["v_contrastboost", "contrastboost"], DEFAULT_RENDER_CONFIG.contrastBoost),
          brightness: configNumber(assignments, ["brightness", "v_brightness"], DEFAULT_RENDER_CONFIG.brightness)
        });
      }).catch(function(error) {
        console.warn("Unable to apply canvas gamma from fte.cfg:", error);
        applyCanvasRenderConfig(DEFAULT_RENDER_CONFIG);
      });
    }

    function decodePathSegment(value) {
      try {
        return decodeURIComponent(value);
      } catch (_error) {
        return value;
      }
    }

    function fileNameFromValue(value) {
      var clean = cleanValue(value).split(/[?#]/)[0].replace(/\\/g, "/");
      var parts = clean.split("/");
      return decodePathSegment(parts[parts.length - 1] || "");
    }

    function splitList(value) {
      if (Array.isArray(value)) {
        return value;
      }
      return String(value || "")
        .split(/[\n,;]/)
        .map(cleanValue)
        .filter(Boolean);
    }

    function parseMaybeJsonArray(value) {
      if (Array.isArray(value)) {
        return value;
      }
      if (!value) {
        return [];
      }
      try {
        var parsed = JSON.parse(String(value));
        return Array.isArray(parsed) ? parsed : [];
      } catch (_error) {
        return [];
      }
    }

    function sanitizeVirtualFileName(value, fallback) {
      var name = fileNameFromValue(value) || fallback;
      return name.replace(/[\\/]/g, "_").replace(/[^a-z0-9._()[\]+ -]/gi, "_");
    }

    function sourceForRelativeValue(value) {
      var clean = cleanValue(value).replace(/\\/g, "/");
      if (/^(https?:|data:|blob:)/i.test(clean) || clean.charAt(0) === "/") {
        return clean;
      }
      return clean;
    }

    function sourceForMap(mapValue, fallbackFile) {
      var clean = cleanValue(mapValue).replace(/\\/g, "/");
      if (/^(https?:|data:|blob:)/i.test(clean) || clean.charAt(0) === "/") {
        return clean;
      }

      if (/^(?:\.\.\/|\.\/)?maps\//i.test(clean)) {
        return clean
          .replace(/^\.\.\/maps\//i, "../../maps/")
          .replace(/^\.\//, "../../")
          .replace(/^maps\//i, "../../maps/");
      }

      if (/^id1\/maps\//i.test(clean)) {
        return clean;
      }

      var fileName = fallbackFile || fileNameFromValue(clean);
      var folder = (fileName.charAt(0) || "_").toUpperCase();
      return "../../maps/" + encodeURIComponent(folder) + "/" + encodeURIComponent(fileName);
    }

    function normalizeMapDescriptor(mapValue) {
      var raw = mapValue;
      var source = "";
      var file = "";

      if (raw && typeof raw === "object") {
        source = cleanValue(raw.source || raw.src || raw.url || raw.href || raw.path);
        file = cleanValue(raw.file || raw.name || raw.map || raw.bsp || raw.mapName || raw.map_name);
        raw = file || source;
      }

      file = file || fileNameFromValue(raw);
      file = file.replace(/^maps\//i, "").replace(/^id1\/maps\//i, "");

        return false;
      }
      var tagName = String(target.tagName || "").toLowerCase();
      var type = String(target.type || "").toLowerCase();
      return target.isContentEditable ||
        tagName === "textarea" ||
        (tagName === "input" && /^(?:text|search|url|tel|email|password|number)$/i.test(type));
    }

    function updateShowscoresState() {
      var shouldShow = keyboardShowscoresDown || pointerShowscoresDown;
      if (shouldShow === showscoresDown) {
        return;
      }
      showscoresDown = shouldShow;
      sendEngineCommand(showscoresDown ? "+showscores" : "-showscores");
    }

    function holdShowscores(source) {
      if (source === "pointer") {
        pointerShowscoresDown = true;
      } else {
        keyboardShowscoresDown = true;
      }
      updateShowscoresState();
    }

    function releaseShowscores(source) {
      if (source === "pointer") {
        pointerShowscoresDown = false;
      } else if (source === "keyboard") {
        keyboardShowscoresDown = false;
      } else {
        keyboardShowscoresDown = false;
        pointerShowscoresDown = false;
      }
      updateShowscoresState();
    }

    function handleShowscoresKeyboard(event) {
      if (event.key !== "Tab" || event.altKey || event.ctrlKey || event.metaKey || isTextInputTarget(event.target)) {
        return false;
      }

      if (event.type === "keydown") {
        holdShowscores("keyboard");
        showOverlayTemporarily();
        return true;
      }

      if (event.type === "keyup") {
        releaseShowscores("keyboard");
        return true;
      }

      return event.type === "keypress";
    }

    function nudgeDemoFrame(direction) {
      if (!playbackPaused) {
        setPlaybackPaused(true, true);
      }
      sendEngineCommand("demo_nudge " + direction);
      showOverlayTemporarily();
    }

    function jumpDemoToTime(seconds) {
      sendEngineCommand("demo_jump " + Math.max(0, Math.round(Number(seconds) || 0)));
      showOverlayTemporarily();
    }

    function handlePercentSeekKeyboard(event) {
      if (event.type !== "keydown" || event.altKey || event.ctrlKey || event.metaKey || event.repeat || isTextInputTarget(event.target)) {
        return false;
      }
      if (event.key === "," || event.key === "<" || event.key === "." || event.key === ">") {
        nudgeDemoFrame((event.key === "," || event.key === "<") ? "-1" : "+1");
        return true;
      }
      if (event.key === "0") {
        jumpDemoToTime(0);
        return true;
      }
      if (!/^[1-9]$/.test(event.key) || demoDuration <= 0) {
        return false;
      }

      var percentage = Number(event.key) / 10;
      var targetSeconds = Math.max(0, Math.round(demoDuration * percentage));
      jumpDemoToTime(targetSeconds);
      return true;
    }

    function handleButtonKeyboard(event) {
      if (event.type !== "keydown" || !isKeyboardActivation(event)) {
        return false;
      }

      var target = event.target;
      if (!target || typeof target.closest !== "function") {
        return false;
      }

      var playbackButton = target.closest("[data-player-control]");
      if (playbackButton && !playbackButton.disabled) {
        handlePlaybackButton(playbackButton);
        return true;
      }

      if (volumeToggle && target.closest("#volumeToggle") === volumeToggle && !volumeToggle.disabled) {
        setVolume(currentVolume > 0 ? 0 : (previousAudibleVolume || INITIAL_VOLUME), true);
        showOverlayTemporarily();
        return true;
      }

      if (fullscreenButton && target.closest("#fullscreenButton") === fullscreenButton && !fullscreenButton.disabled) {
        toggleFullscreen();
        showOverlayTemporarily();
        return true;
      }

      return false;
    }

    function blockEngineKeyboardEvent(event) {
      var handledControl = handleShowscoresKeyboard(event) || handlePercentSeekKeyboard(event) || handleSliderKeyboard(event) || handleSpeedKeyboard(event) || handleButtonKeyboard(event);
      if (handledControl) {
        event.preventDefault();
      }
      event.stopImmediatePropagation();
    }

    function formatClock(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        return "--:--";
      }

      var rounded = Math.floor(seconds);
      var minutes = Math.floor(rounded / 60);
      var remainder = rounded % 60;
      return minutes + ":" + String(remainder).padStart(2, "0");
    }

    function updatePlaybackTime() {
      if (!playbackTimeElement) {
        return;
      }

      try {
        if (typeof Module !== "undefined" && Module && typeof Module.getDemoTime === "function") {
          playbackTimeElement.textContent = formatClock(Number(Module.getDemoTime()));
        }
      } catch (_error) {
        // The engine can briefly expose Module before demo state is ready.
      }

      window.setTimeout(updatePlaybackTime, 250);
    }

    function stopControlEvent(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function stopOverlayPointerEvent(event) {
      event.stopPropagation();
    }

    function stopOverlayButtonEvent(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function stopWheelEvent(event) {
      event.stopImmediatePropagation();
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = 0;
      }
    }

    function beginCanvasLongPress(event) {
      if (event.type === "pointerdown" && event.button !== 0) {
        return;
      }
      clearLongPressTimer();
      longPressPointerId = event.pointerId == null ? null : event.pointerId;
      longPressTimer = window.setTimeout(function() {
        longPressTimer = 0;
        holdShowscores("pointer");
        showOverlayTemporarily();
      }, LONG_PRESS_SHOWSCORES_MS);
    }

    function endCanvasLongPress(event) {
      if (longPressPointerId !== null && event.pointerId !== longPressPointerId) {
        return;
      }
      clearLongPressTimer();
      longPressPointerId = null;
      releaseShowscores("pointer");
    }

    function cancelCanvasLongPress() {
      clearLongPressTimer();
      longPressPointerId = null;
      releaseShowscores("pointer");
    }

    function releaseAllShowscores() {
      clearLongPressTimer();
      longPressPointerId = null;
      releaseShowscores();
    }

    function handleCanvasSurfaceEvent(event) {
      event.preventDefault();
      if (event.type === "pointerdown") {
        beginCanvasLongPress(event);
      } else if (event.type === "pointerup") {
        endCanvasLongPress(event);
      } else if (event.type === "pointercancel" || event.type === "pointerleave") {
        cancelCanvasLongPress();
      } else if (event.type === "dblclick") {
        cancelCanvasLongPress();
        toggleFullscreen();
        showOverlayTemporarily();
      } else if (event.type === "contextmenu") {
        cancelCanvasLongPress();
      }
      event.stopImmediatePropagation();
    }

    function stopCanvasClickEvent(event) {
      event.preventDefault();
      event.stopImmediatePropagation();
    }

    ["wheel", "mousewheel", "DOMMouseScroll"].forEach(function(type) {
      canvas.addEventListener(type, stopWheelEvent, {
        capture: true,
        passive: false
      });
    });

    ["pointerdown", "pointerup", "pointercancel", "pointerleave", "dblclick", "contextmenu"].forEach(function(type) {
      canvas.addEventListener(type, handleCanvasSurfaceEvent, {
        capture: true,
        passive: false
      });
    });

    ["mousedown", "mouseup", "click", "auxclick"].forEach(function(type) {
      canvas.addEventListener(type, stopCanvasClickEvent, {
        capture: true,
        passive: false
      });
    });

    controlButtons.forEach(function(button) {
      ["pointerdown", "mousedown", "mouseup"].forEach(function(type) {
        button.addEventListener(type, stopControlEvent);
      });

      button.addEventListener("click", function(event) {
        stopControlEvent(event);
        handlePlaybackButton(button);
      });
    });

    if (speedSelect) {
      ["pointerdown", "pointerup", "mousedown", "mouseup", "click"].forEach(function(type) {
        speedSelect.addEventListener(type, stopOverlayPointerEvent);
      });
      speedSelect.addEventListener("change", function(event) {
        event.stopPropagation();
        setPlaybackSpeed(speedSelect.value, true);
      });
    }

    if (playerViewport) {
      ["pointermove", "touchstart"].forEach(function(type) {
        playerViewport.addEventListener(type, showOverlayTemporarily, {
          passive: true
        });
      });
    }

    if (playerOverlay) {
      ["pointerdown", "pointerup", "mousedown", "mouseup", "click", "dblclick", "contextmenu"].forEach(function(type) {
        playerOverlay.addEventListener(type, stopOverlayPointerEvent);
      });
    }

    if (volumeToggle) {
      ["pointerdown", "mousedown", "mouseup"].forEach(function(type) {
        volumeToggle.addEventListener(type, stopOverlayPointerEvent);
      });
      volumeToggle.addEventListener("click", function(event) {
        stopOverlayButtonEvent(event);
        if (currentVolume > 0) {
          setVolume(0, true);
        } else {
          setVolume(previousAudibleVolume || INITIAL_VOLUME, true);
        }
        showOverlayTemporarily();
      });
    }

    if (volumeSlider) {
      ["pointerdown", "pointerup", "mousedown", "mouseup", "click"].forEach(function(type) {
        volumeSlider.addEventListener(type, stopOverlayPointerEvent);
      });
      volumeSlider.addEventListener("input", function(event) {
        event.stopPropagation();
        setVolume(volumeSlider.value, true);
        showOverlayTemporarily();
      });
      volumeSlider.addEventListener("change", function(event) {
        event.stopPropagation();
        setVolume(volumeSlider.value, true);
        showOverlayTemporarily();
      });
    }

    if (fullscreenButton) {
      ["pointerdown", "mousedown", "mouseup"].forEach(function(type) {
        fullscreenButton.addEventListener(type, stopOverlayPointerEvent);
      });
      fullscreenButton.addEventListener("click", function(event) {
        stopOverlayButtonEvent(event);
        toggleFullscreen();
        showOverlayTemporarily();
      });
    }

    document.addEventListener("fullscreenchange", handleFullscreenChange);
    document.addEventListener("webkitfullscreenchange", handleFullscreenChange);
    window.addEventListener("blur", releaseAllShowscores);
    window.addEventListener("message", function(event) {
      var data = event.data || {};
      if (event.source !== window.parent || !data || data.type !== "q1tools-demo-player-command") {
        return;
      }
      if (data.command === "-showscores") {
        releaseShowscores("keyboard");
      } else if (data.command === "+showscores") {
        holdShowscores("keyboard");
      } else if (data.shortcut === "demo_nudge") {
        nudgeDemoFrame(data.direction === "-1" ? "-1" : "+1");
      } else if (data.shortcut === "demo_jump") {
        jumpDemoToTime(data.seconds);
      } else {
        sendEngineCommand(String(data.command || ""));
      }
      if (data.showOverlay) {
        showOverlayTemporarily();
      }
    });
    ["keydown", "keyup", "keypress"].forEach(function(type) {
      window.addEventListener(type, blockEngineKeyboardEvent, {
        capture: true
      });
    });
    setVolume(INITIAL_VOLUME, false);
    updateSpeedSelectWidth();

    if (!selectedDemo) {
      showError(selectedName ? "Unknown demo: " + selectedName : "No demo selected. Drop a .dem in the /demo tool to play it.");
    } else {
      document.title = selectedDemo.title + " - FTE Demo Player";
      document.getElementById("demo-title").textContent = selectedDemo.title;

      setStatus("Checking map assets...");
      Promise.all([loadCanvasRenderConfig(), prepareFilesForDemo(selectedDemo)]).then(function(results) {
        var files = results[1];
        var Module = {
          arguments: [
            "-nohome",
            "-width", "640",
            "-height", "480",
            "+set", "vid_fullscreen", "0",
            "+set", "vid_width", "640",
            "+set", "vid_height", "480",
            "+set", "vid_hardwaregamma", "2",
            "+set", "vid_srgb", "0",
            "+set", "v_gammainverted", "1",
            "+set", "gl_load24bit", "0",
            "+set", "plug_sbar", "0",
            "+set", "cl_sbar", "1",
            "+set", "viewsize", "100",
            "+set", "scr_centersbar", "1",
            "+set", "hud_miniscores_show", "0",
            "+set", "hud_tracking_show", "0",
            "+set", "sbar_teamstatus", "0",
            "+set", "scr_autoid_health", "0",
            "+set", "scr_autoid_armor", "0",
            "+set", "scr_autoid_weapon", "0",
            "+set", "scr_autoid_weapon_mask", "0",
            "+set", "scr_scoreboard_newstyle", "0",
            "+set", "scr_scoreboard_teamscores", "0",
            "+set", "scr_scoreboard_showfrags", "0",
            "+set", "scr_scoreboard_showflags", "0",
            "+set", "cl_nocsqc", "1",
            "+set", "r_shadow_realtime_dlight", "0",
            "+set", "r_shadow_realtime_dlight_shadows", "0",
            "+set", "r_shadow_realtime_world", "0",
            "+set", "r_shadow_realtime_world_shadows", "0",
            "+set", "r_shadow_realtime_world_importlightentitiesfrommap", "0",
            "+set", "r_shadow_shadowmapping", "0",
            "+set", "r_shadow_raytrace", "0",
            "+set", "r_shadow_playershadows", "0",
            "+set", "r_shadows", "0",
            "+set", "r_deluxemapping", "0",
            "+set", "snd_samplebits", "32",
            "+set", "volume", String(INITIAL_VOLUME),
            "+exec", "fte.cfg",
            "+playdemo", selectedDemo.file
          ],
          files: files,
          canvas: canvas,
          print: function(message) {
            console.log(message);
          },
          printErr: function(message) {
            console.warn(message);
          },
          setStatus: setStatus,
          totalDependencies: 0,
          monitorRunDependencies: function(left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
          },
          postRun: [
            function() {
              if (Module.sched === undefined) {
                showError("Unable to initialise the FTE runtime.");
              } else {
                setPlaybackControlsEnabled(true);
                fitPlayerToWindow();
                updatePlaybackTime();
                setStatus("");
              }
            }
          ]
        };

        window.Module = Module;
        setStatus("Downloading...");
        var script = document.createElement("script");
        script.src = "ftewebgl.js";
        script.type = "text/javascript";
        script.charset = "utf-8";
        script.addEventListener("error", function() {
          showError("Unable to download ftewebgl.js.");
        });
        document.head.appendChild(script);
      }).catch(function(error) {
        showError(error && error.message ? error.message : String(error));
      });
    }
  </script>
</body>
</html>
