<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FTE Demo Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c0c;
      --text: #edf2ee;
      --muted: #a9b4b0;
      --border: #2d2f2f;
      --accent: #d48f52;
      --accent-track: #2f241f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 16px 20px 18px;
    }

    .topbar {
      width: var(--player-width, 640px);
      max-width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      min-width: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .size {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .viewport {
      width: var(--player-width, 640px);
      height: var(--player-height, 480px);
      max-width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      outline: 1px solid var(--border);
    }

    canvas.emscripten {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      aspect-ratio: 4 / 3;
      border: 0;
      margin: 0;
      padding: 0;
      background: #000;
    }

    .controls {
      width: var(--player-width, 640px);
      max-width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .loading-controls {
      width: 100%;
      min-height: 35px;
      display: grid;
      align-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .playback-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .controls button {
      appearance: none;
      min-width: 64px;
      border: 1px solid #705948;
      border-radius: 6px;
      background: linear-gradient(180deg, #6f4f3d, #4f3a2f);
      color: #f2e2d0;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.16s ease, transform 0.16s ease, opacity 0.16s ease;
    }

    .controls button:hover:not(:disabled),
    .controls button:focus-visible:not(:disabled) {
      border-color: #d39a68;
      transform: translateY(-1px);
    }

    .controls button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .playback-time {
      min-width: 58px;
      color: var(--muted);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      text-align: right;
    }

    #progress {
      width: 100%;
      height: 8px;
      accent-color: var(--accent);
      border: 0;
      border-radius: 999px;
      background: var(--accent-track);
      overflow: hidden;
    }

    #progress::-webkit-progress-bar {
      background: var(--accent-track);
      border-radius: 999px;
    }

    #progress::-webkit-progress-value {
      background: var(--accent);
      border-radius: 999px;
    }

    #progress::-moz-progress-bar {
      background: var(--accent);
      border-radius: 999px;
    }

    .error {
      width: 640px;
      max-width: 100%;
      padding: 12px 14px;
      border: 1px solid #754640;
      border-radius: 6px;
      background: #21100f;
      color: #ffd5cd;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1 id="demo-title">FTE Demo Player</h1>
      <div class="size">640x480</div>
    </div>

    <div class="viewport">
      <canvas class="emscripten" id="canvas" width="640" height="480" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <div class="controls" aria-live="polite">
      <div id="loadingControls" class="loading-controls">
        <div id="status">Preparing player...</div>
        <progress value="0" max="100" id="progress" hidden></progress>
      </div>
      <div id="playbackControls" class="playback-controls" aria-label="Playback controls" hidden>
        <button type="button" data-player-control="back" disabled>-2s</button>
        <button type="button" data-player-control="pause" disabled>Pause</button>
        <button type="button" data-player-control="play" disabled>Play</button>
        <button type="button" data-player-control="forward" disabled>+2s</button>
        <button type="button" data-player-control="volumeDown" disabled>Vol -</button>
        <button type="button" data-player-control="volumeUp" disabled>Vol +</button>
        <span id="playback-time" class="playback-time">--:--</span>
      </div>
    </div>
    <div id="error" class="error" hidden></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="quake106.js?v=20260506a"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var statusElement = document.getElementById("status");
    var progressElement = document.getElementById("progress");
    var errorElement = document.getElementById("error");
    var canvas = document.getElementById("canvas");
    var sizeElement = document.querySelector(".size");
    var loadingControlsElement = document.getElementById("loadingControls");
    var playbackControlsElement = document.getElementById("playbackControls");
    var controlButtons = Array.prototype.slice.call(document.querySelectorAll("[data-player-control]"));
    var playbackTimeElement = document.getElementById("playback-time");
    var PAK1_REQUIRED_MAP_PATTERN = /^(?:e[34]m[0-9]+|dm[1-6])$/i;
    var PLAYER_VERTICAL_MARGIN = 36;
    var ENGINE_CONTROL_COMMANDS = {
      back: "demo_jump -2",
      pause: "demo_setspeed 0",
      play: "demo_setspeed 100",
      forward: "demo_jump +2",
      volumeDown: "inc volume -0.05",
      volumeUp: "inc volume 0.05"
    };
    var BUILT_IN_PACKAGES = [
      {
        file: "ctf.pk3",
        source: "../../paks/ctf.pk3",
        maps: [
          "ctf1.bsp", "ctf2.bsp", "ctf3.bsp", "ctf4.bsp", "ctf5.bsp", "ctf6.bsp", "ctf7.bsp", "ctf8.bsp", "ctfstart.bsp",
          "ctf2m1.bsp", "ctf2m2.bsp", "ctf2m3.bsp", "ctf2m4.bsp", "ctf2m5.bsp", "ctf2m6.bsp", "ctf2m7.bsp", "ctf2m8.bsp",
          "ctf3m1.bsp", "ctf3m2.bsp", "ctf3m3.bsp", "ctf3m4.bsp", "ctf3m5.bsp", "ctf3m6.bsp", "ctf3m7.bsp", "ctf3m8.bsp", "ctf3m9.bsp"
        ],
        providesPak1Maps: false
      },
      {
        file: "ra.pk3",
        source: "../../paks/ra.pk3",
        maps: [
          "23ar-a.bsp", "2pyramid.bsp", "2towers.bsp", "arendm1a.bsp", "arenarg2.bsp", "arenarg4.bsp", "arenarg5.bsp",
          "arenarg6.bsp", "arenax.bsp", "arenazap.bsp", "arenrg3a.bsp", "arma4.bsp", "barena1.bsp", "basarena.bsp",
          "bbarena2.bsp", "bunmoo3.bsp", "bunski.bsp", "chamber1.bsp", "crandome.bsp", "dm2arena.bsp", "dom2_1ra.bsp",
          "egyptra.bsp", "football.bsp", "gear8.bsp", "gearpr0n.bsp", "gnurena.bsp", "hill20.bsp", "iarena2.bsp",
          "id3.bsp", "lowgrav.bsp", "marena2.bsp", "marena3.bsp", "marena4.bsp", "mayan1.bsp", "nilsrar3.bsp",
          "pen2.bsp", "pitarena.bsp", "ptucket.bsp", "ra_funkf.bsp", "rarena3.bsp", "rgarden.bsp", "soyarena.bsp",
          "terrain2.bsp", "uarena1.bsp", "unholy.bsp", "xarena3.bsp", "yard1.bsp"
        ],
        providesPak1Maps: false
      }
    ];
    var demoConfig = [
      "cl_maxfps_slop 0",
      "bind d \"demo_setspeed 100\"",
      "bind t \"demo_setspeed 0\"",
      "bind leftarrow \"demo_jump -2\"",
      "bind rightarrow \"demo_jump +2\"",
      "alias f_specmapend \"demo_setspeed 0\""
    ].join("\n") + "\n";

    function cleanValue(value) {
      return String(value || "").trim().replace(/^["']|["']$/g, "").trim();
    }

    function decodePathSegment(value) {
      try {
        return decodeURIComponent(value);
      } catch (_error) {
        return value;
      }
    }

    function fileNameFromValue(value) {
      var clean = cleanValue(value).split(/[?#]/)[0].replace(/\\/g, "/");
      var parts = clean.split("/");
      return decodePathSegment(parts[parts.length - 1] || "");
    }

    function splitList(value) {
      if (Array.isArray(value)) {
        return value;
      }
      return String(value || "")
        .split(/[\n,;]/)
        .map(cleanValue)
        .filter(Boolean);
    }

    function parseMaybeJsonArray(value) {
      if (Array.isArray(value)) {
        return value;
      }
      if (!value) {
        return [];
      }
      try {
        var parsed = JSON.parse(String(value));
        return Array.isArray(parsed) ? parsed : [];
      } catch (_error) {
        return [];
      }
    }

    function asciiArrayBuffer(text) {
      var bytes = new Uint8Array(text.length);
      for (var i = 0; i < text.length; i++) {
        bytes[i] = text.charCodeAt(i) & 255;
      }
      return bytes.buffer;
    }

    function sanitizeVirtualFileName(value, fallback) {
      var name = fileNameFromValue(value) || fallback;
      return name.replace(/[\\/]/g, "_").replace(/[^a-z0-9._()[\]+ -]/gi, "_");
    }

    function sourceForRelativeValue(value) {
      var clean = cleanValue(value).replace(/\\/g, "/");
      if (/^(https?:|data:|blob:)/i.test(clean) || clean.charAt(0) === "/") {
        return clean;
      }
      return clean;
    }

    function sourceForMap(mapValue, fallbackFile) {
      var clean = cleanValue(mapValue).replace(/\\/g, "/");
      if (/^(https?:|data:|blob:)/i.test(clean) || clean.charAt(0) === "/") {
        return clean;
      }

      if (/^(?:\.\.\/|\.\/)?maps\//i.test(clean)) {
        return clean
          .replace(/^\.\.\/maps\//i, "../../maps/")
          .replace(/^\.\//, "../../")
          .replace(/^maps\//i, "../../maps/");
      }

      if (/^id1\/maps\//i.test(clean)) {
        return clean;
      }

      var fileName = fallbackFile || fileNameFromValue(clean);
      var folder = (fileName.charAt(0) || "_").toUpperCase();
      return "../../maps/" + encodeURIComponent(folder) + "/" + encodeURIComponent(fileName);
    }

    function normalizeMapDescriptor(mapValue) {
      var raw = mapValue;
      var source = "";
      var file = "";

      if (raw && typeof raw === "object") {
        source = cleanValue(raw.source || raw.src || raw.url || raw.href || raw.path);
        file = cleanValue(raw.file || raw.name || raw.map || raw.bsp || raw.mapName || raw.map_name);
        raw = file || source;
      }

      file = file || fileNameFromValue(raw);
      file = file.replace(/^maps\//i, "").replace(/^id1\/maps\//i, "");
      file = fileNameFromValue(file);
      if (file && !/\.(bsp|lit)$/i.test(file)) {
        file += ".bsp";
      }
      if (!file) {
        return null;
      }

      return {
        file: file,
        source: sourceForMap(source || raw, file)
      };
    }

    function mapFileNeedsPak1(file) {
      var clean = fileNameFromValue(file).replace(/\.(?:bsp|lit)$/i, "").toLowerCase();
      return PAK1_REQUIRED_MAP_PATTERN.test(clean);
    }

    function normalizePackageDescriptor(packageValue) {
      if (!packageValue || typeof packageValue !== "object") {
        return null;
      }

      var source = cleanValue(packageValue.source || packageValue.src || packageValue.url || packageValue.href || packageValue.path);
      var file = sanitizeVirtualFileName(packageValue.file || packageValue.name || source || "maps.pak", "maps.pak");
      var maps = [];
      var seenMaps = {};

      if (!source) {
        return null;
      }
      if (!/\.p(?:ak|k3)$/i.test(file)) {
        file += ".pak";
      }

      splitList(packageValue.maps).concat(splitList(packageValue.map)).forEach(function(mapValue) {
        var fileName = fileNameFromValue(mapValue);
        if (fileName && !/\.(bsp|lit)$/i.test(fileName)) {
          fileName += ".bsp";
        }
        var key = fileName.toLowerCase();
        if (key && !seenMaps[key]) {
          maps.push(fileName);
          seenMaps[key] = true;
        }
      });

      return {
        file: file,
        source: sourceForRelativeValue(source),
        maps: maps,
        providesPak1Maps: !!packageValue.providesPak1Maps || /^pak1\.pak$/i.test(file)
      };
    }

    function packageProvidesMap(packageInfo, mapFile) {
      var base = fileNameFromValue(mapFile).replace(/\.(?:bsp|lit)$/i, "").toLowerCase();
      if (!base) {
        return false;
      }
      if (packageInfo.providesPak1Maps && PAK1_REQUIRED_MAP_PATTERN.test(base)) {
        return true;
      }
      return packageInfo.maps.some(function(map) {
        return fileNameFromValue(map).replace(/\.(?:bsp|lit)$/i, "").toLowerCase() === base;
      });
    }

    function packagesProvideMap(packages, mapFile) {
      return packages.some(function(packageInfo) {
        return packageProvidesMap(packageInfo, mapFile);
      });
    }

    function packagesNeededForMaps(packages, maps) {
      if (!maps.length) {
        return packages.slice();
      }

      return packages.filter(function(packageInfo) {
        return maps.some(function(map) {
          return packageProvidesMap(packageInfo, map.file || map);
        });
      });
    }

    function builtInPackagesForMap(mapFile) {
      return BUILT_IN_PACKAGES.filter(function(packageInfo) {
        return packageProvidesMap(packageInfo, mapFile);
      });
    }

    function normalizeDemoSpec(spec, fallbackName) {
      var source = cleanValue(spec.source || spec.src || spec.url || spec.href || spec.path);
      var file = sanitizeVirtualFileName(spec.file || source || fallbackName, "demo.dem");
      var pak1Source = cleanValue(spec.pak1Source || spec.pak1 || spec.pak1Url || spec.pak1_url);
      var maps = [];
      var seenMaps = {};
      var packages = [];
      var seenPackages = {};

      if (source && !/\.(dem|mvd|qwd|qwz|dz)$/i.test(file)) {
        file += ".dem";
      }

      splitList(spec.maps).concat(splitList(spec.map)).forEach(function(mapValue) {
        var map = normalizeMapDescriptor(mapValue);
        if (!map) {
          return;
        }
        var key = map.file.toLowerCase();
        if (!seenMaps[key]) {
          maps.push(map);
          seenMaps[key] = true;
        }
      });

      parseMaybeJsonArray(spec.packages).forEach(function(packageValue) {
        var packageInfo = normalizePackageDescriptor(packageValue);
        if (!packageInfo) {
          return;
        }
        var key = packageInfo.file.toLowerCase();
        if (!seenPackages[key]) {
          packages.push(packageInfo);
          seenPackages[key] = true;
        }
      });

      if (pak1Source && !seenPackages["pak1.pak"]) {
        packages.push({
          file: sanitizeVirtualFileName(spec.pak1File || "pak1.pak", "pak1.pak"),
          source: sourceForRelativeValue(pak1Source),
          maps: [],
          providesPak1Maps: true
        });
      }

      return {
        title: cleanValue(spec.title || spec.name || spec.label) || file,
        file: file,
        source: sourceForRelativeValue(source || ("id1/" + file)),
        pak1Source: pak1Source ? sourceForRelativeValue(pak1Source) : "",
        pak1File: pak1Source ? sanitizeVirtualFileName(spec.pak1File || "pak1.pak", "pak1.pak") : "",
        packages: packages,
        maps: maps
      };
    }

    function specFromQuery() {
      var source = params.get("source") || params.get("src") || params.get("url");
      if (!source) {
        return null;
      }

      return normalizeDemoSpec({
        source: source,
        file: params.get("file") || "",
        title: params.get("title") || params.get("name") || "",
        pak1Source: params.get("pak1Source") || params.get("pak1") || "",
        pak1File: params.get("pak1File") || "",
        packages: params.get("packages") || "",
        maps: params.get("maps") || "",
        map: params.get("map") || ""
      }, source);
    }

    function specFromSession() {
      var launchKey = params.get("launch");
      if (!launchKey) {
        return null;
      }

      try {
        var text = window.localStorage.getItem(launchKey);
        if (!text) {
          return null;
        }
        window.localStorage.removeItem(launchKey);
        return normalizeDemoSpec(JSON.parse(text), launchKey);
      } catch (_error) {
        return null;
      }
    }

    var selectedName = params.get("demo") || params.get("source") || params.get("launch") || "";
    var selectedDemo = specFromSession() || specFromQuery();

    function requestEngineResize() {
      if (typeof window.onresize !== "function") {
        return;
      }

      requestAnimationFrame(function() {
        window.onresize();
      });
    }

    function viewportSize() {
      var viewport = window.visualViewport;
      var widths = [window.innerWidth, document.documentElement.clientWidth];
      var heights = [window.innerHeight, document.documentElement.clientHeight];
      if (viewport) {
        widths.push(viewport.width);
        heights.push(viewport.height);
      }
      if (window.frameElement) {
        var frameRect = window.frameElement.getBoundingClientRect();
        if (frameRect.width) {
          widths.push(frameRect.width);
        }
        if (frameRect.height) {
          heights.push(frameRect.height);
        }
      }

      return {
        width: Math.min.apply(Math, widths.filter(function(value) {
          return Number.isFinite(value) && value > 0;
        })),
        height: Math.min.apply(Math, heights.filter(function(value) {
          return Number.isFinite(value) && value > 0;
        }))
      };
    }

    function setPlayerSize(width) {
      var roundedWidth = Math.floor(width);
      var roundedHeight = Math.floor(roundedWidth * 3 / 4);

      document.documentElement.style.setProperty("--player-width", roundedWidth + "px");
      document.documentElement.style.setProperty("--player-height", roundedHeight + "px");
      sizeElement.textContent = roundedWidth + "x" + roundedHeight;
    }

    function reservedPlayerHeight() {
      var shellStyle = getComputedStyle(document.querySelector(".shell"));
      var verticalPadding = parseFloat(shellStyle.paddingTop) + parseFloat(shellStyle.paddingBottom);
      var topbarHeight = document.querySelector(".topbar").getBoundingClientRect().height;
      var controlsHeight = document.querySelector(".controls").getBoundingClientRect().height;
      var gap = parseFloat(shellStyle.gap) || 0;

      return verticalPadding + topbarHeight + controlsHeight + gap;
    }

    function fitPlayerToWindow() {
      var viewport = viewportSize();
      var maxWidth = Math.max(160, viewport.width - 40);
      var width = maxWidth;

      for (var pass = 0; pass < 4; pass++) {
        setPlayerSize(width);
        var availableHeight = Math.max(120, viewport.height - reservedPlayerHeight() - PLAYER_VERTICAL_MARGIN);
        var nextWidth = Math.min(maxWidth, availableHeight * 4 / 3);

        if (Math.abs(nextWidth - width) < 1) {
          width = nextWidth;
          break;
        }
        width = nextWidth;
      }

      setPlayerSize(width);
      requestEngineResize();
    }

    window.addEventListener("resize", fitPlayerToWindow);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitPlayerToWindow);
    }
    fitPlayerToWindow();

    function showError(message) {
      if (playbackControlsElement) {
        playbackControlsElement.hidden = true;
      }
      if (loadingControlsElement) {
        loadingControlsElement.hidden = true;
      }
      statusElement.hidden = true;
      progressElement.hidden = true;
      errorElement.textContent = message;
      errorElement.hidden = false;
    }

    function setStatus(text) {
      if (setStatus.interval) {
        clearInterval(setStatus.interval);
      }

      var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      if (match) {
        text = match[1].trim();
        progressElement.value = parseInt(match[2], 10) * 100;
        progressElement.max = parseInt(match[4], 10) * 100;
        progressElement.hidden = false;
      } else {
        progressElement.value = 0;
        progressElement.max = 100;
        progressElement.hidden = true;
      }

      statusElement.textContent = text;
      statusElement.hidden = text.length === 0;
    }

    function setPlaybackControlsEnabled(enabled) {
      if (loadingControlsElement) {
        loadingControlsElement.hidden = enabled;
      }
      if (playbackControlsElement) {
        playbackControlsElement.hidden = !enabled;
      }
      controlButtons.forEach(function(button) {
        button.disabled = !enabled;
      });
    }

    function sourceLooksImmediate(source) {
      return /^(?:blob:|data:)/i.test(cleanValue(source));
    }

    function sourceExists(source) {
      var clean = cleanValue(source);
      if (!clean) {
        return Promise.resolve(false);
      }
      if (sourceLooksImmediate(clean)) {
        return Promise.resolve(true);
      }

      return fetch(clean, {
        method: "HEAD",
        cache: "force-cache"
      }).then(function(response) {
        return response.ok;
      }).catch(function() {
        return false;
      });
    }

    function addPackageFile(files, mountedPackages, packageInfo) {
      var virtualPath = "id1/" + packageInfo.file;
      if (files[virtualPath]) {
        return;
      }

      files[virtualPath] = packageInfo.source;
      mountedPackages.push(packageInfo);
    }

    function addMapFile(files, map) {
      files["id1/maps/" + map.file] = map.source;
      if (map.file.toLowerCase() !== map.file) {
        files["id1/maps/" + map.file.toLowerCase()] = map.source;
      }
    }

    function baseFiles() {
      var files = {
        "default.fmf": "default.fmf",
        "id1/demo.cfg": asciiArrayBuffer(demoConfig),
        "qw/fte.cfg": asciiArrayBuffer(demoConfig),
        "ctf/fte.cfg": asciiArrayBuffer(demoConfig),
        "id1/data.pk3": "qw/data.pk3",
        "id1/fragfile.dat": "id1/fragfile.dat"
      };

      if (window.Quake106Shareware && typeof window.Quake106Shareware.extractPak0 === "function") {
        files["id1/pak0.pak"] = window.Quake106Shareware.extractPak0({
          setStatus: setStatus
        }).catch(function(error) {
          var message = error && error.message ? error.message : String(error);
          showError("Unable to prepare pak0.pak from quake106.zip: " + message);
          throw error;
        });
      }

      return files;
    }

    function prepareFilesForDemo(demo) {
      var assetFiles = {};
      var mountedPackages = [];
      var neededPackages = packagesNeededForMaps(demo.packages, demo.maps);

      neededPackages.forEach(function(packageInfo) {
        addPackageFile(assetFiles, mountedPackages, packageInfo);
      });

      assetFiles["id1/" + demo.file] = demo.source;

      return demo.maps.reduce(function(chain, map) {
        return chain.then(function() {
          if (packagesProvideMap(mountedPackages, map.file)) {
            return;
          }

          if (mapFileNeedsPak1(map.file)) {
            throw new Error("This demo uses " + fileNameFromValue(map.file) + ", which needs pak1.pak or another package containing that map. Drop the .pak first, then drop the .dem again.");
          }

          var fallbackPackages = builtInPackagesForMap(map.file);
          if (fallbackPackages.length) {
            fallbackPackages.forEach(function(packageInfo) {
              addPackageFile(assetFiles, mountedPackages, packageInfo);
            });
            return;
          }

          return sourceExists(map.source).then(function(exists) {
            if (exists) {
              addMapFile(assetFiles, map);
              return;
            }

            addMapFile(assetFiles, map);
          });
        });
      }, Promise.resolve()).then(function() {
        var files = baseFiles();
        Object.keys(assetFiles).forEach(function(path) {
          files[path] = assetFiles[path];
        });
        return files;
      });
    }

    function focusCanvas() {
      try {
        canvas.focus({ preventScroll: true });
      } catch (_error) {
        canvas.focus();
      }
    }

    function sendEngineCommand(command) {
      if (!command) {
        return;
      }

      focusCanvas();
      if (typeof FTEC !== "undefined" && FTEC && typeof FTEC.cbufadd === "function") {
        FTEC.cbufadd(command + "\n");
      }
    }

    function formatClock(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        return "--:--";
      }

      var rounded = Math.floor(seconds);
      var minutes = Math.floor(rounded / 60);
      var remainder = rounded % 60;
      return minutes + ":" + String(remainder).padStart(2, "0");
    }

    function updatePlaybackTime() {
      if (!playbackTimeElement) {
        return;
      }

      try {
        if (typeof Module !== "undefined" && Module && typeof Module.getDemoTime === "function") {
          playbackTimeElement.textContent = formatClock(Number(Module.getDemoTime()));
        }
      } catch (_error) {
        // The engine can briefly expose Module before demo state is ready.
      }

      window.setTimeout(updatePlaybackTime, 250);
    }

    function stopControlEvent(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function stopWheelEvent(event) {
      event.stopImmediatePropagation();
    }

    function stopCanvasClickEvent(event) {
      event.preventDefault();
      event.stopImmediatePropagation();
    }

    ["wheel", "mousewheel", "DOMMouseScroll"].forEach(function(type) {
      canvas.addEventListener(type, stopWheelEvent, {
        capture: true,
        passive: false
      });
    });

    ["pointerdown", "pointerup", "mousedown", "mouseup", "click", "dblclick", "auxclick", "contextmenu"].forEach(function(type) {
      canvas.addEventListener(type, stopCanvasClickEvent, {
        capture: true,
        passive: false
      });
    });

    controlButtons.forEach(function(button) {
      ["pointerdown", "mousedown", "mouseup"].forEach(function(type) {
        button.addEventListener(type, stopControlEvent);
      });

      button.addEventListener("click", function(event) {
        stopControlEvent(event);
        sendEngineCommand(ENGINE_CONTROL_COMMANDS[button.getAttribute("data-player-control")]);
      });
    });

    if (!selectedDemo) {
      showError(selectedName ? "Unknown demo: " + selectedName : "No demo selected. Drop a .dem in the /demo tool to play it.");
    } else {
      document.title = selectedDemo.title + " - FTE Demo Player";
      document.getElementById("demo-title").textContent = selectedDemo.title;

      setStatus("Checking map assets...");
      prepareFilesForDemo(selectedDemo).then(function(files) {
        var Module = {
          arguments: [
            "-nohome",
            "-width", "640",
            "-height", "480",
            "+set", "vid_fullscreen", "0",
            "+set", "vid_width", "640",
            "+set", "vid_height", "480",
            "+set", "gl_font", "graybugs",
            "+set", "snd_samplebits", "32",
            "+set", "volume", "0.05",
            "+playdemo", selectedDemo.file
          ],
          files: files,
          canvas: canvas,
          print: function(message) {
            console.log(message);
          },
          printErr: function(message) {
            console.warn(message);
          },
          setStatus: setStatus,
          totalDependencies: 0,
          monitorRunDependencies: function(left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
          },
          postRun: [
            function() {
              if (Module.sched === undefined) {
                showError("Unable to initialise the FTE runtime.");
              } else {
                setPlaybackControlsEnabled(true);
                fitPlayerToWindow();
                updatePlaybackTime();
                setStatus("");
              }
            }
          ]
        };

        window.Module = Module;
        setStatus("Downloading...");
        var script = document.createElement("script");
        script.src = "ftewebgl.js";
        script.type = "text/javascript";
        script.charset = "utf-8";
        script.addEventListener("error", function() {
          showError("Unable to download ftewebgl.js.");
        });
        document.head.appendChild(script);
      }).catch(function(error) {
        showError(error && error.message ? error.message : String(error));
      });
    }
  </script>
</body>
</html>
