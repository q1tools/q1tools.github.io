<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quake Demo Tool</title>
    <link rel="icon" type="image/png" href="demo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../sav/style.css">
    <link rel="stylesheet" href="style.css?v=20260321a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script defer src="dzip.js?v=20260321a"></script>
    <script defer src="parser.js?v=20260321a"></script>
    <script defer src="app.js?v=20260321a"></script>
</head>
<body>
    <main class="page">
        <header class="hero">
            <div id="quakefontheader">quake demo tool</div>
        </header>

        <section class="panel input-panel">
            <div id="dropZone" class="drop-zone" tabindex="0" role="button" aria-controls="fileInput">
                <strong>Drop one or more <code>.dem</code> or <code>.dz</code> files here</strong>
                <small>or click to choose them from your computer</small>
                <small>or <a href="#" id="folderLink">select an entire demos folder</a></small>
            </div>
            <input id="fileInput" type="file" accept=".dem,.DEM,.dz,.DZ,application/octet-stream" multiple hidden>
            <input id="folderInput" type="file" webkitdirectory directory hidden>

            <div class="actions">
                <button id="clearButton" type="button" disabled>Clear</button>
                <div id="status" class="status" aria-live="polite">No demos loaded.</div>
            </div>

            <ul id="warnings" class="warnings" hidden></ul>
        </section>

        <section id="summaryPanel" class="panel" hidden>
            <div class="section-head">
                <h2>Summary</h2>
            </div>
            <div id="summaryGrid" class="summary-grid"></div>
            <div id="summaryActions" class="summary-actions" hidden></div>
        </section>

        <section id="captimePanel" class="panel" hidden>
            <div class="section-head">
                <h2>Captime Records</h2>
            </div>
            <div id="captimeContent"></div>
        </section>

        <section id="folderAnalysisPanel" class="panel" hidden>
            <div class="section-head">
                <h2>Folder Analysis</h2>
            </div>
            <div id="folderAnalysisContent"></div>
        </section>

        <section id="resultsPanel" class="results" hidden></section>
    </main>

    <div id="footer">
        Created by woods &nbsp;&nbsp;| &nbsp;&nbsp;<a href="https://github.com/q1tools/q1tools.github.io"><i class="fa-brands fa-github"></i></a>
    </div>
</body>
</html>
